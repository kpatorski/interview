<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 14px}
h1{font-size:1.45rem;font-weight:700;color:#7dd3fc;margin-bottom:3px}
.subtitle{font-size:0.82rem;color:#475569;margin-bottom:18px}
.stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.stat{background:#1e293b;border-radius:10px;padding:7px 14px;text-align:center}
.stat-value{font-size:1.25rem;font-weight:700}
.stat-label{font-size:0.68rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.stat.c .stat-value{color:#4ade80}.stat.w .stat-value{color:#f87171}.stat.t .stat-value{color:#7dd3fc}.stat.p .stat-value{color:#fbbf24}

.fb:hover{border-color:#7dd3fc}
.progress-bar{width:100%;max-width:720px;height:4px;background:#1e293b;border-radius:2px;margin-bottom:14px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#2563eb,#7dd3fc);border-radius:2px;transition:width .4s}
.card{background:#1e293b;border-radius:16px;padding:22px;max-width:720px;width:100%;border:1px solid #334155}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.qnum{font-size:.78rem;color:#64748b;margin-bottom:5px}
.question{font-size:.98rem;font-weight:600;line-height:1.6;margin-bottom:16px;color:#f1f5f9}
.mhint{font-size:.73rem;color:#94a3b8;margin-bottom:9px;font-style:italic}
.options{display:flex;flex-direction:column;gap:8px}
.opt{background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:10px 13px;cursor:pointer;transition:all .15s;font-size:.9rem;line-height:1.4;display:flex;align-items:flex-start;gap:9px}
.opt:hover:not(.dis){border-color:#7dd3fc;background:#172032}
.opt.sel{border-color:#7dd3fc;background:#172032}

.opt.sel .cb{border-color:#7dd3fc;background:#7dd3fc;color:#0f172a}
.opt.ok .cb,.opt.rev .cb{border-color:#4ade80!important;background:#4ade80!important;color:#052e16!important}
.opt.bad .cb{border-color:#f87171!important;background:#f87171!important;color:white!important}
.btn{padding:9px 22px;border-radius:10px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.bp{background:#2563eb;color:white}.bp:hover{background:#1d4ed8}
.bs{background:#334155;color:#e2e8f0}.bs:hover{background:#475569}

.actions{margin-top:16px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.exp{margin-top:12px;padding:12px 14px;background:#0f172a;border-radius:10px;border-left:3px solid #7dd3fc;font-size:.84rem;line-height:1.65;color:#cbd5e1;display:none}
.exp.show{display:block}
.exp strong{color:#7dd3fc}
.exp code{background:#1e293b;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.83em;color:#fbbf24}
.exp-wrong{margin-top:8px;padding:8px 12px;background:#1a0a0a;border-radius:8px;border-left:3px solid #f87171;font-size:.82rem;color:#fca5a5}
.exp-wrong strong{color:#f87171}
.di{font-size:.76rem;color:#64748b;margin-left:auto}
.end{text-align:center;padding:28px 12px}
</style>

<body>
<h1>🎯 Interview Quiz</h1>
<p class="subtitle">kpatorski/interview · <span id="tc"></span> pytań</p>
<div class="stats">
  <div class="stat t"><div class="stat-value" id="st">0</div><div class="stat-label">Pytań</div></div>
  <div class="stat c"><div class="stat-value" id="sc">0</div><div class="stat-label">✓ Poprawnych</div></div>
  <div class="stat w"><div class="stat-value" id="sw">0</div><div class="stat-label">✗ Błędnych</div></div>
  <div class="stat p"><div class="stat-value" id="sp">–</div><div class="stat-label">Skuteczność</div></div>
</div>
<div class="filter-bar" id="fb"></div>
<div class="progress-bar"><div class="pf" id="pf"></div></div>
<div class="card" id="card"></div>
<script>
const Q=[
// ═══════ ARCHITECTURE ═══════
{cat:'architecture',type:'single',
q:'Hexagonal Architecture definiuje "Port" jako:',
opts:[
  'Klasę konfiguracyjną rejestrującą beany w kontenerze IoC',
  'Technologicznie agnostyczny interfejs w rdzeniu domeny, niezależny od szczegółów infrastruktury',
  'Adapter HTTP tłumaczący requesty REST na obiekty domenowe',
  'Warstwę pośrednią między bazą danych a logiką aplikacji'
],
cor:'Technologicznie agnostyczny interfejs w rdzeniu domeny, niezależny od szczegółów infrastruktury',
exp:'Port = interfejs zdefiniowany wewnątrz domeny (np. <code>OrderRepository</code>). Nie zna szczegółów technologicznych. Adapter = konkretna implementacja (np. <code>JpaOrderRepository</code>). Cel: domena izolowana od infrastruktury.'
},
{cat:'architecture',type:'single',
q:'W Clean Architecture "The Dependency Rule" mówi, że:',
opts:[
  'Każda klasa powinna mieć co najwyżej jedną zależność, aby zachować zasadę SRP',
  'Frameworki i bazy danych mogą importować klasy z warstwy use cases gdy jest to uzasadnione',
  'Zależności między modułami zawsze wskazują do wewnątrz — outer layers zależą od inner, nigdy odwrotnie',
  'Zależności są zarządzane przez kontener DI, więc kierunek nie ma znaczenia'
],
cor:'Zależności między modułami zawsze wskazują do wewnątrz — outer layers zależą od inner, nigdy odwrotnie',
exp:'Entities nie wiedzą nic o Use Cases. Use Cases nie wiedzą nic o Controllers. Controllers nie wiedzą nic o Frameworks. Naruszenie tej reguły = framework "zaraża" domenę.'
},
{cat:'architecture',type:'single',
q:'Czym różni się fokus Hexagonal Architecture od Clean Architecture?',
opts:[
  'Hexagonal skupia się na warstwie aplikacji (use cases), Clean na warstwie domeny (entities)',
  'Hexagonal skupia się na tym jak aplikacja komunikuje się ze światem zewnętrznym (integracje), Clean na tym co aplikacja robi (use cases)',
  'Hexagonal definiuje 6 warstw (stąd nazwa), Clean definiuje 4 warstwy koncentryczne',
  'Hexagonal jest architekturą mikroserwisową, Clean jest architekturą monolityczną'
],
cor:'Hexagonal skupia się na tym jak aplikacja komunikuje się ze światem zewnętrznym (integracje), Clean na tym co aplikacja robi (use cases)',
exp:'Hexagonal pyta: jak aplikacja komunikuje się ze światem zewnętrznym? Clean pyta: co aplikacja robi (jakie ma przypadki użycia)? Onion pyta: czym jest rdzeń biznesu domenowego? Trzy architektury uzupełniają się nawzajem i nie wykluczają.'
},
{cat:'architecture',type:'multi',
q:'Które twierdzenia o CQRS są PRAWDZIWE? (wielokrotny wybór)',
opts:[
  'Lightweight CQRS może działać na jednej wspólnej bazie danych z oddzielnymi modelami odczytu i zapisu',
  'CQRS wymaga fizycznie osobnych baz danych — inaczej nie ma sensu go stosować',
  'Event Sourcing prawie zawsze implikuje CQRS, bo eventy naturalnie tworzą projekcje read modelu',
  'Command zmienia stan systemu i nie może zwracać danych; Query odczytuje stan i nie zmienia systemu',
  'CQRS jest wymagany do zastosowania Event Sourcing'
],
cor:['Lightweight CQRS może działać na jednej wspólnej bazie danych z oddzielnymi modelami odczytu i zapisu','Event Sourcing prawie zawsze implikuje CQRS, bo eventy naturalnie tworzą projekcje read modelu','Command zmienia stan systemu i nie może zwracać danych; Query odczytuje stan i nie zmienia systemu'],
exp:'(A)✅ Lightweight CQRS = ta sama baza, różne modele. (C)✅ ES produkuje eventy → naturalne źródło dla projekcji. (D)✅ Fundamentalna zasada CQRS. (B)❌ Osobne bazy to opcja, nie wymóg. (E)❌ CQRS nie wymaga ES — to odwrotna zależność.'
},
{cat:'architecture',type:'single',
q:'W Event Sourcing agregat ładowany jest przez:',
opts:[
  'Odczyt ostatniego snapshotu z tabeli snapshots w bazie relacyjnej',
  'SELECT * FROM aggregate_state WHERE id=? zwracający aktualny wiersz encji',
  'Replay wszystkich eventów od początku (lub od ostatniego snapshotu) w celu odtworzenia bieżącego stanu',
  'Deserializację obiektu z cache L2 Hibernate przechowywanego w Redis'
],
cor:'Replay wszystkich eventów od początku (lub od ostatniego snapshotu) w celu odtworzenia bieżącego stanu',
exp:'ES: "State is derived, not stored." Agregat: załaduj eventy → zastosuj każdy po kolei → odtworzony stan. Snapshot optymalizuje: załaduj snapshot → zastosuj tylko eventy po nim.'
},
{cat:'architecture',type:'single',
q:'Snapshot w Event Sourcing rozwiązuje problem:',
opts:[
  'Braku możliwości rollbacku transakcji w systemach event-driven',
  'Powolnego ładowania agregatów z tysiącami eventów — snapshot skraca replay do eventów po punkcie snapshotu',
  'Braku spójności między read modelem a write modelem w Full CQRS',
  'Duplikacji eventów przy at-least-once delivery z message brokera'
],
cor:'Powolnego ładowania agregatów z tysiącami eventów — snapshot skraca replay do eventów po punkcie snapshotu',
exp:'Agregat z 50 000 eventami: replay kosztuje setki ms. Snapshot co N eventów: przy ładowaniu weź snapshot + tylko eventy po nim → akceptowalny czas. To optymalizacja wydajności, nie zmiana modelu.'
},
{cat:'architecture',type:'single',
q:'Optimistic locking w Event Store oparty na numerze wersji agregatu służy do:',
opts:[
  'Szyfrowania eventów przed zapisem do event store w celu zapewnienia bezpieczeństwa',
  'Wykrywania konfliktów współbieżności: dwie transakcje czytają ten sam agregat, jedna zapisuje pierwsza, druga dostaje błąd',
  'Wersjonowania schematu eventów przy ewolucji modelu domenowego',
  'Limitowania liczby eventów zapisywanych przez jednego producenta na sekundę'
],
cor:'Wykrywania konfliktów współbieżności: dwie transakcje czytają ten sam agregat, jedna zapisuje pierwsza, druga dostaje błąd',
exp:'<code>expected_version == current_version</code>. Jeśli A i B czytają agregat w wersji 5, A zapisuje → wersja = 6. B próbuje zapisać z expected=5 → 0 rows → OptimisticLockException → B musi ponowić.'
},
{cat:'architecture',type:'single',
q:'Wady mikrousług w porównaniu do monolitu to przede wszystkim:',
opts:[
  'Brak możliwości granularnego skalowania poszczególnych komponentów systemu',
  'Złożoność operacyjna (DevOps, service mesh), trudności z konsystencją danych (brak ACID cross-service), wyższa latencja sieciowa',
  'Konieczność użycia jednego języka programowania dla wszystkich serwisów',
  'Niemożność izolowania awarii — błąd w jednym serwisie zawsze powoduje awarię całego systemu'
],
cor:'Złożoność operacyjna (DevOps, service mesh), trudności z konsystencją danych (brak ACID cross-service), wyższa latencja sieciowa',
exp:'Zalety (nie wady): granularne skalowanie, izolacja awarii, niezależny deployment, polyglot. Wady: setki serwisów = duże nakłady DevOps, distributed transactions wymagają Saga, network calls wolniejsze niż in-process.'
},
{cat:'architecture',type:'single',
q:'Eventual consistency w Full CQRS pojawia się, ponieważ:',
opts:[
  'Event Store używa innego silnika bazodanowego niż Read Database, co wymusza replikację asynchroniczną',
  'Projekcje aktualizują Read Model asynchronicznie po zapisie do Event Store — krótko po commicie command read model może być nieaktualny',
  'HTTP jest z natury bezstanowy i nie gwarantuje natychmiastowej spójności między requestami',
  'CQRS wymaga rozdzielenia wątków dla operacji odczytu i zapisu, co wprowadza opóźnienia'
],
cor:'Projekcje aktualizują Read Model asynchronicznie po zapisie do Event Store — krótko po commicie command read model może być nieaktualny',
exp:'Przepływ: Command → Event Store → [async] → Projection → Read DB. Projekcja może opóźnić się o ms lub sekundy. System musi tolerować: "You just created an order, but the list might not show it immediately."'
},
{cat:'architecture',type:'single',
q:'Kiedy Event Sourcing jest złym wyborem?',
opts:[
  'Gdy system wymaga pełnego audit logu wszystkich zmian danych',
  'Gdy domena jest złożona i eventy naturalnie odzwierciedlają procesy biznesowe',
  'Gdy aplikacja to prosty CRUD bez wymagań audytowych, a zespół nie ma doświadczenia z ES',
  'Gdy system musi obsługiwać high-throughput i potrzebuje możliwości replay eventów'
],
cor:'Gdy aplikacja to prosty CRUD bez wymagań audytowych, a zespół nie ma doświadczenia z ES',
exp:'ES nie nadaje się do: CRUD, paneli admina, niedoświadczonego zespołu. "Don\'t use it when there are no audit requirements and simple state suffices." Koszty złożoności (projekcje, eventual consistency, snapshot strategy) przewyższają wtedy korzyści.'
},

// ═══════ PATTERNS ═══════
{cat:'patterns',type:'single',
q:'Outbox Pattern rozwiązuje problem:',
opts:[
  'Duplikacji wiadomości po stronie konsumenta przy at-least-once delivery z Kafki',
  'Zapewnienia że event jest opublikowany wtedy i tylko wtedy gdy transakcja bazodanowa się powiedzie — eliminuje partial failure',
  'Przeciążenia message brokera przez buforowanie wiadomości w pamięci producenta',
  'Serializacji eventów do formatu zgodnego z Apache Avro lub Protobuf'
],
cor:'Zapewnienia że event jest opublikowany wtedy i tylko wtedy gdy transakcja bazodanowa się powiedzie — eliminuje partial failure',
exp:'Co się stanie gdy baza zatwierdzi transakcję, ale wysłanie zdarzenia się nie powiedzie? Wzorzec Outbox zapisuje zdarzenie w tabeli outbox w tej samej transakcji co dane domenowe. Oddzielny proces relay asynchronicznie publikuje zdarzenia do brokera. Eliminuje oba problemy: baza OK ale zdarzenie nie wysłane, oraz zdarzenie wysłane ale baza cofnięta.'
},
{cat:'patterns',type:'single',
q:'Inbox Pattern rozwiązuje problem:',
opts:[
  'Zagubienia eventów gdy message broker jest tymczasowo niedostępny',
  'Wielokrotnego przetworzenia tej samej wiadomości przy at-least-once delivery — gwarantuje exactly-once processing',
  'Braku możliwości replay eventów w RabbitMQ po restarcie brokera',
  'Kolejkowania wiadomości wychodzących gdy downstream serwis jest przeciążony'
],
cor:'Wielokrotnego przetworzenia tej samej wiadomości przy at-least-once delivery — gwarantuje exactly-once processing',
exp:'Broker dostarcza at-least-once → duplikaty są normalne. Inbox: przed wykonaniem logiki sprawdź <code>message_id</code> w tabeli inbox. Jeśli znany → skip. Jeśli nowy: INSERT + logika w jednej transakcji. Gwarantuje exactly-once semantics.'
},
{cat:'patterns',type:'single',
q:'Outbox i Inbox Pattern — poprawne przypisanie stron:',
opts:[
  'Outbox po stronie konsumenta zapewnia niezawodne przetworzenie; Inbox po stronie producenta zapewnia niezawodne wysłanie',
  'Oba działają po stronie konsumenta — Outbox dla eventów domenowych, Inbox dla eventów infrastrukturalnych',
  'Outbox po stronie producenta (reliable publish); Inbox po stronie konsumenta (reliable receive / exactly-once)',
  'Oba działają po stronie producenta — razem tworzą transactional messaging pipeline'
],
cor:'Outbox po stronie producenta (reliable publish); Inbox po stronie konsumenta (reliable receive / exactly-once)',
exp:'Outbox: "Did I successfully publish?" → producent. Inbox: "Did I already process this?" → konsument. Razem eliminują problemy at-least-once delivery na obu końcach systemu.'
},
{cat:'patterns',type:'single',
q:'Saga Pattern w architekturze mikroserwisów służy do:',
opts:[
  'Szyfrowania komunikacji między serwisami przy użyciu certyfikatów mTLS',
  'Utrzymania spójności danych w procesach biznesowych obejmujących wiele serwisów bez użycia distributed transactions (2PC)',
  'Automatycznego skalowania serwisów na podstawie długości kolejki wiadomości',
  'Cache\'owania odpowiedzi między serwisami w celu redukcji latencji'
],
cor:'Utrzymania spójności danych w procesach biznesowych obejmujących wiele serwisów bez użycia distributed transactions (2PC)',
exp:'"How do I keep the system consistent when a business process spans multiple services?" Saga = sekwencja lokalnych transakcji. Każdy krok ma compensation action. Krok N failuje → cofaj N-1, N-2… Alternatywa dla 2PC.'
},
{cat:'patterns',type:'single',
q:'Choreography-based Saga a Orchestration-based Saga — kluczowa różnica:',
opts:[
  'Choreography wymaga centralnego repozytorium stanu Sagi; Orchestration przechowuje stan lokalnie w każdym serwisie',
  'W Choreography każdy serwis reaguje autonomicznie na eventy; w Orchestration centralny orchestrator jawnie steruje krokami i zna cały przepływ',
  'Choreography używa synchronicznych wywołań HTTP; Orchestration używa asynchronicznych kolejek',
  'W Choreography serwisy mogą failować bez kompensacji; w Orchestration kompensacje są obowiązkowe'
],
cor:'W Choreography każdy serwis reaguje autonomicznie na eventy; w Orchestration centralny orchestrator jawnie steruje krokami i zna cały przepływ',
exp:'Choreography: ✅ Fully decoupled ⚠️ Trudne do debugowania i rozumowania o całym flow. Orchestration: ✅ Centralized control, łatwiejsze monitorowanie ⚠️ Orchestrator może stać się bottle-neck i God Object.'
},
{cat:'patterns',type:'single',
q:'Circuit Breaker w stanie OPEN zachowuje się tak:',
opts:[
  'Przepuszcza ograniczoną liczbę testowych requestów by sprawdzić czy downstream serwis się naprawił',
  'Przekierowuje ruch do repliki serwisu zarejestrowanej jako fallback w service registry',
  'Natychmiast odrzuca requesty (fail fast) bez próby połączenia z downstream — opcjonalnie wykonuje fallback',
  'Kolejkuje requesty w pamięci i ponawia je automatycznie po upływie timeout\'u'
],
cor:'Natychmiast odrzuca requesty (fail fast) bez próby połączenia z downstream — opcjonalnie wykonuje fallback',
exp:'OPEN: fail fast chroni wątki przed blokowaniem na timeoutach. Fallback = cached response, default value, degraded mode. Po timeout → HALF-OPEN: testowe requesty. Sukces → CLOSED. Fail → z powrotem OPEN.'
},
{cat:'patterns',type:'single',
q:'Circuit Breaker zapobiega "cascading failures", ponieważ:',
opts:[
  'Szyfruje komunikację między serwisami eliminując possibility man-in-the-middle ataki',
  'Niedostępny downstream serwis blokuje wątki callera czekające na timeout — bez CB wyczerpują się pule wątków i awaria się rozszerza',
  'Automatycznie restartuje downstream serwis gdy wykryje że przestał odpowiadać',
  'Limituje liczbę równoległych requestów do downstream serwisu przez rate limiting'
],
cor:'Niedostępny downstream serwis blokuje wątki callera czekające na timeout — bez CB wyczerpują się pule wątków i awaria się rozszerza',
exp:'Bez CB: A woła B (down, timeout 30s), 100 wątków A blokuje się na 30s, pula wyczerpana, A niedostępny dla C → C nedostępny dla D → cascade. CB przerywa łańcuch przez immediate fail-fast.'
},
{cat:'patterns',type:'single',
q:'Jak Inbox Pattern gwarantuje exactly-once processing?',
opts:[
  'Broker nadaje każdej wiadomości unikalny hash i odrzuca duplikaty na poziomie serwera',
  'Konsument sprawdza tabelę inbox dla <code>message_id</code>, jeśli nowy: INSERT + logika w jednej atomowej transakcji, ACK; jeśli znany: tylko ACK',
  'Konsument przetwarza wiadomości synchronicznie sekwencyjnie — brak równoległości eliminuje duplikaty',
  'Producent oznacza wiadomości jako "processed" w event store po potwierdzeniu przez konsumenta'
],
cor:'Konsument sprawdza tabelę inbox dla <code>message_id</code>, jeśli nowy: INSERT + logika w jednej atomowej transakcji, ACK; jeśli znany: tylko ACK',
exp:'Atomowość jest kluczowa: INSERT do inbox i logika biznesowa w tej samej DB transakcji. Jeśli transakcja failuje — rollback obu. Przy retry: message_id już w inbox → skip. Gwarantuje idempotency.'
},

// ═══════ JPA ═══════
{cat:'jpa',type:'single',
q:'JPA i Hibernate — jaka jest między nimi relacja?',
opts:[
  'JPA to implementacja Hibernate — JPA dostarcza konkretny kod, Hibernate dostarcza interfejsy',
  'Hibernate to implementacja specyfikacji JPA — JPA definiuje interfejsy i reguły, Hibernate dostarcza konkretny kod',
  'JPA i Hibernate to dwie niezależne specyfikacje ORM, konkurujące ze sobą',

q:'Co to jest wzorzec Retry z exponential backoff?',
opts:[
  'Wzorzec do równoległego wykonywania wielu operacji i zwracania pierwszego wyniku',
  'Automatyczne ponowienie nieudanej operacji z rosnącym czasem oczekiwania między próbami — chroni przed przeciążeniem downstream serwisu',
  'Mechanizm cache\'owania wyników operacji aby unikać powtarzania kosztownych obliczeń',
  'Wzorzec podziału operacji na etapy wykonywane przez oddzielne wątki'
],
cor:'Automatyczne ponowienie nieudanej operacji z rosnącym czasem oczekiwania między próbami — chroni przed przeciążeniem downstream serwisu',
wrong:{
  'Wzorzec do równoległego wykonywania wielu operacji i zwracania pierwszego wyniku':'To opis wzorca Race / CompetingConsumers lub CompletableFuture.anyOf(). Retry dotyczy ponawiania jednej operacji, nie równoległości.',
  'Mechanizm cache\'owania wyników operacji aby unikać powtarzania kosztownych obliczeń':'To opis Cache-Aside lub Memoization. Retry nie cache\'uje — ponawia nieudaną operację.',
  'Wzorzec podziału operacji na etapy wykonywane przez oddzielne wątki':'To opis Pipeline lub Producer-Consumer. Retry to prosty wzorzec odporności — ponów przy błędzie.'
},
exp:'Exponential backoff: pierwsza próba natychmiast, po błędzie czekaj 1s, po kolejnym błędzie 2s, 4s, 8s... z jitterem (losowym przesunięciem) dla uniknięcia "thundering herd". Resilience4j: @Retry(name="myRetry"). Ważne: operacja musi być idempotentna! Retry na POST bez idempotency key = duplikaty. Łącz z Circuit Breaker: retry → CB otwiera się po N próbach.'
},

{cat:'patterns',type:'single',
q:'Co to jest Bulkhead Pattern?',
opts:[
  'Wzorzec do szyfrowania komunikacji między serwisami w architekturze mikroserwisowej',
  'Izolacja zasobów (pul wątków, połączeń) dla różnych konsumentów — awaria jednego nie wyczerpuje zasobów innych',
  'Wzorzec tworzenia kopii zapasowych danych w odizolowanych lokalizacjach geograficznych',
  'Mechanizm autoryzacji dzielący użytkowników na grupy z różnymi uprawnieniami'
],
cor:'Izolacja zasobów (pul wątków, połączeń) dla różnych konsumentów — awaria jednego nie wyczerpuje zasobów innych',
wrong:{
  'Wzorzec do szyfrowania komunikacji między serwisami w architekturze mikroserwisowej':'To opis mTLS lub service mesh (Istio). Bulkhead dotyczy izolacji zasobów, nie szyfrowania.',
  'Wzorzec tworzenia kopii zapasowych danych w odizolowanych lokalizacjach geograficznych':'To opis georedundancy lub disaster recovery. Bulkhead to metafora z budownictwa okrętowego — wodoszczelne przegrody w kadłubie.',
  'Mechanizm autoryzacji dzielący użytkowników na grupy z różnymi uprawnieniami':'To opis RBAC. Bulkhead izoluje zasoby techniczne (wątki, połączenia), nie uprawnienia.'
},
exp:'Metafora: przegrody (bulkheads) w statku — dziura w jednym przedziale nie zatopia całości. W IT: oddzielna pula wątków dla każdego downstream serwisu. Jeśli serwis B jest wolny i 100 wątków go czeka, nie blokuje wywołań do serwisu C. Resilience4j Bulkhead: thread pool isolation lub semaphore isolation. Połącz z Circuit Breaker dla pełnej odporności.'
},

{cat:'patterns',type:'single',
q:'Co to jest wzorzec Transactional Outbox i czym różni się od zwykłego publikowania eventów?',
opts:[
  'Outbox to kolejka w pamięci (in-memory queue) do asynchronicznego przetwarzania zdarzeń wewnątrz jednej aplikacji',
  'Outbox zapisuje zdarzenia do tabeli w tej samej transakcji co dane, zapewniając atomowość — zwykłe publikowanie to dwie osobne operacje bez gwarancji atomowości',
  'Outbox szyfruje zdarzenia przed wysłaniem do brokera — zwykłe publikowanie wysyła plaintext',
  'Outbox buforuje zdarzenia gdy broker jest przeciążony — zwykłe publikowanie odrzuca je przy backpressure'
],
cor:'Outbox zapisuje zdarzenia do tabeli w tej samej transakcji co dane, zapewniając atomowość — zwykłe publikowanie to dwie osobne operacje bez gwarancji atomowości',
wrong:{
  'Outbox to kolejka w pamięci (in-memory queue) do asynchronicznego przetwarzania zdarzeń wewnątrz jednej aplikacji':'In-memory queue (np. ArrayBlockingQueue) nie przeżyje restartu aplikacji. Outbox używa trwałej tabeli bazodanowej właśnie dla gwarancji trwałości i atomowości.',
  'Outbox szyfruje zdarzenia przed wysłaniem do brokera — zwykłe publikowanie wysyła plaintext':'Szyfrowanie to osobna warstwa (TLS, message-level encryption). Outbox dotyczy atomowości i niezawodności, nie bezpieczeństwa.',
  'Outbox buforuje zdarzenia gdy broker jest przeciążony — zwykłe publikowanie odrzuca je przy backpressure':'Zarówno Outbox jak i zwykłe publikowanie mogą implementować retry przy niedostępności brokera. Kluczowa różnica Outbox to atomowość z transakcją bazodanową.'
},
exp:'Problem bez Outbox: saveOrder() + publishEvent() — baza OK, broker down = zdarzenie zagubione; broker OK, baza rollback = ghost event. Z Outbox: BEGIN TRANSACTION; INSERT order; INSERT outbox; COMMIT; → relay publikuje asynchronicznie. Gwarancja: jeśli commit się powiódł — zdarzenie BĘDZIE opublikowane. At-least-once delivery (relay może ponowić).'
},

{cat:'patterns',type:'single',
q:'Co to jest wzorzec CQRS (Command Query Responsibility Segregation)?',
opts:[
  'Wzorzec separacji logiki biznesowej od warstwy dostępu do danych w architekturze warstwowej',
  'Separacja operacji zmieniających stan (Command) od operacji odczytujących stan (Query) — oddzielne modele, opcjonalnie oddzielne bazy',
  'Wzorzec kolejkowania żądań HTTP aby chronić serwer przed przeciążeniem',
  'Mechanizm synchronizacji cache z bazą danych przy użyciu zdarzeń'
],
cor:'Separacja operacji zmieniających stan (Command) od operacji odczytujących stan (Query) — oddzielne modele, opcjonalnie oddzielne bazy',
wrong:{
  'Wzorzec separacji logiki biznesowej od warstwy dostępu do danych w architekturze warstwowej':'To opis Repository Pattern lub Clean Architecture. CQRS to separacja Command/Query, nie warstw aplikacji.',
  'Wzorzec kolejkowania żądań HTTP aby chronić serwer przed przeciążeniem':'To opis rate limiting lub load leveling. CQRS dotyczy modelu danych i operacji, nie ruchu sieciowego.',
  'Mechanizm synchronizacji cache z bazą danych przy użyciu zdarzeń':'To opis cache invalidation przez eventy. CQRS to wzorzec architektoniczny, nie mechanizm cache.'
},
exp:'CQRS: Command (PlaceOrder, CancelOrder) → modyfikuje stan → zapisuje do Write DB. Query (GetOrderList, GetOrderDetails) → odczytuje → z Read DB (może być denormalizowana). Korzyści: niezależne skalowanie odczytu/zapisu, optymalizacja modelu pod konkretne potrzeby. Lightweight CQRS: ta sama baza, oddzielne modele. Full CQRS: oddzielne bazy + projekcje.'
},

{cat:'jpa',type:'single',
q:'Co to jest Persistence Context w JPA i jaką rolę pełni?',
opts:[
  'Plik konfiguracyjny persistence.xml definiujący połączenie z bazą danych i mapowania encji',
  'Cache pierwszego poziomu śledzący zarządzane encje w ramach jednej sesji — gwarantuje że ta sama encja w sesji to zawsze ta sama instancja Java',
  'Globalny cache drugiego poziomu współdzielony przez wszystkie sesje w aplikacji',
  'Kontekst Spring Security przechowujący dane zalogowanego użytkownika w wątku'
],
cor:'Cache pierwszego poziomu śledzący zarządzane encje w ramach jednej sesji — gwarantuje że ta sama encja w sesji to zawsze ta sama instancja Java',
wrong:{
  'Plik konfiguracyjny persistence.xml definiujący połączenie z bazą danych i mapowania encji':'persistence.xml to konfiguracja jednostki trwałości (persistence unit), nie Persistence Context. PC to runtime concept — kontener encji w trakcie działania.',
  'Globalny cache drugiego poziomu współdzielony przez wszystkie sesje w aplikacji':'To opis Second Level Cache (L2). Persistence Context to cache L1 — per EntityManager, nie współdzielony.',
  'Kontekst Spring Security przechowujący dane zalogowanego użytkownika w wątku':'To opis SecurityContext ze Spring Security. Persistence Context to koncepcja JPA do zarządzania encjami.'
},
exp:'Persistence Context (PC) = identity map + unit of work. Identity map: ten sam ID w sesji → zawsze ta sama instancja Java (findById dwa razy = ten sam obiekt). Unit of work: śledzi zmiany (dirty checking), zbiera operacje, wysyła je do DB przy flush. Zakres: domyślnie transaction-scoped — nowy PC na każdą @Transactional metodę.'
},

{cat:'jpa',type:'single',
q:'Jakie są cztery stany cyklu życia encji w JPA?',
opts:[
  'Created, Saved, Updated, Deleted — odpowiadają operacjom CRUD',
  'New, Active, Inactive, Archived — odzwierciedlają stany biznesowe encji',
  'Transient (nowa), Managed (zarządzana), Detached (odłączona), Removed (oznaczona do usunięcia)',
  'Pending, Committed, Rolled Back, Closed — odpowiadają stanom transakcji'
],
cor:'Transient (nowa), Managed (zarządzana), Detached (odłączona), Removed (oznaczona do usunięcia)',
wrong:{
  'Created, Saved, Updated, Deleted — odpowiadają operacjom CRUD':'To intuicyjne nazwy, ale nie są terminologią JPA. JPA używa: Transient, Managed, Detached, Removed. Mylenie ich z CRUD prowadzi do nieporozumień.',
  'New, Active, Inactive, Archived — odzwierciedlają stany biznesowe encji':'To stany domenowe (biznesowe) encji, nie stany cyklu życia JPA. Encja może być w stanie Managed (JPA) i jednocześnie Active (biznesowo).',
  'Pending, Committed, Rolled Back, Closed — odpowiadają stanom transakcji':'To stany transakcji bazodanowej, nie encji. Encja może być Managed w trakcie transakcji i stać się Detached po jej zakończeniu.'
},
exp:'Transient: new User() — brak ID, nieznana PC. Managed: po persist() lub findById() — PC śledzi, dirty checking aktywny. Detached: po zamknięciu sesji, em.detach(), em.clear() — brak śledzenia, LAZY asocjacje niedostępne. Removed: po em.remove() — zaplanowany DELETE przy flush. Przejścia: Transient→Managed: persist(). Managed→Detached: close(). Detached→Managed: merge().'
},

{cat:'jpa',type:'single',
q:'Co to jest JPQL i czym różni się od SQL?',
opts:[
  'JPQL to skompresowana forma SQL działająca szybciej dzięki eliminacji białych znaków i komentarzy',
  'JPQL (Java Persistence Query Language) operuje na encjach i ich polach Java, a nie na tabelach i kolumnach — jest przenośny między bazami danych',
  'JPQL to procedura składowana Javy wykonywana bezpośrednio w silniku bazy danych',
  'JPQL to XML-owy format zapytań konwertowany automatycznie na SQL przez Spring Data'
],
cor:'JPQL (Java Persistence Query Language) operuje na encjach i ich polach Java, a nie na tabelach i kolumnach — jest przenośny między bazami danych',
wrong:{
  'JPQL to skompresowana forma SQL działająca szybciej dzięki eliminacji białych znaków i komentarzy':'JPQL nie jest szybszy od SQL — jest tłumaczony na SQL przez Hibernate. Nie ma związku z kompresją.',
  'JPQL to procedura składowana Javy wykonywana bezpośrednio w silniku bazy danych':'Procedury składowane to kod SQL w bazie danych. JPQL to język zapytań wykonywany po stronie aplikacji przez JPA provider.',
  'JPQL to XML-owy format zapytań konwertowany automatycznie na SQL przez Spring Data':'JPQL to tekstowy język zapytań (podobny do SQL ale obiektowy). Spring Data może używać JPQL w @Query, ale sam JPQL nie jest XML.'
},
exp:'JPQL: <code>SELECT o FROM Order o JOIN o.customer c WHERE c.city = :city</code>. SQL: <code>SELECT o.* FROM orders o JOIN customers c ON o.customer_id = c.id WHERE c.city = ?</code>. JPQL: encje i pola Java (Order.customer), przenośny między PostgreSQL/MySQL/Oracle. Hibernate tłumaczy JPQL → SQL specyficzny dla bazy. Ograniczenia: brak window functions, JSONB operators → wtedy natywny SQL.'
},

{cat:'jpa',type:'single',
q:'Co to jest FetchType.LAZY vs FetchType.EAGER w JPA?',
opts:[
  'LAZY ładuje encje w tle przez oddzielny wątek, EAGER ładuje synchronicznie w głównym wątku',
  'LAZY: asocjacja ładowana na żądanie (gdy pierwszy raz dostępisz) — proxy; EAGER: asocjacja ładowana zawsze razem z encją nadrzędną w jednym zapytaniu',
  'LAZY używa cache L1, EAGER używa cache L2 — różnica w poziomie cachowania',
  'LAZY wysyła mniej danych przez sieć, EAGER kompresuje dane przed wysłaniem'
],
cor:'LAZY: asocjacja ładowana na żądanie (gdy pierwszy raz dostępisz) — proxy; EAGER: asocjacja ładowana zawsze razem z encją nadrzędną w jednym zapytaniu',
wrong:{
  'LAZY ładuje encje w tle przez oddzielny wątek, EAGER ładuje synchronicznie w głównym wątku':'Oba tryby są synchroniczne. LAZY nie uruchamia tła — po prostu odracza zapytanie SQL do momentu faktycznego dostępu do asocjacji.',
  'LAZY używa cache L1, EAGER używa cache L2 — różnica w poziomie cachowania':'Oba korzystają z cache L1 (Persistence Context). Wybór LAZY/EAGER nie determinuje poziomu cachowania.',
  'LAZY wysyła mniej danych przez sieć, EAGER kompresuje dane przed wysłaniem':'Sieć nie jest tu kluczowa — chodzi o liczbę i moment wykonania zapytań SQL do bazy danych, nie o transmisję sieciową.'
},
exp:'Domyślne: @OneToMany i @ManyToMany → LAZY. @ManyToOne i @OneToOne → EAGER. Problem z EAGER: zawsze ładuje asocjację nawet gdy niepotrzebna — wydajność. Problem z LAZY: LazyInitializationException gdy dostęp poza sesją. Best practice: zostań przy LAZY, używaj JOIN FETCH lub @EntityGraph gdy potrzebujesz asocjacji.'
},

{cat:'spring',type:'single',
q:'Co to jest @Transactional w Spring i co się dzieje gdy nie użyjemy tej adnotacji?',
opts:[
  '@Transactional to adnotacja do walidacji danych wejściowych — bez niej Spring nie waliduje parametrów',
  '@Transactional otwiera transakcję bazodanową przed metodą i zatwierdza (lub cofa) po zakończeniu — bez niej każde zapytanie JPA wykonuje się w osobnej auto-committed transakcji',
  '@Transactional jest opcjonalna — Spring automatycznie grupuje wszystkie zapytania w jedną transakcję w ramach jednego wątku',
  '@Transactional działa tylko z @Repository — bez tej kombinacji JPA nie może działać poprawnie'
],
cor:'@Transactional otwiera transakcję bazodanową przed metodą i zatwierdza (lub cofa) po zakończeniu — bez niej każde zapytanie JPA wykonuje się w osobnej auto-committed transakcji',
wrong:{
  '@Transactional to adnotacja do walidacji danych wejściowych — bez niej Spring nie waliduje parametrów':'Walidacja to @Valid/@Validated z Bean Validation (JSR-380). @Transactional zarządza transakcjami bazodanowymi.',
  '@Transactional jest opcjonalna — Spring automatycznie grupuje wszystkie zapytania w jedną transakcję w ramach jednego wątku':'Spring NIE grupuje automatycznie zapytań. Bez @Transactional: każde zapytanie = osobna transakcja. Dirty checking nie działa. Lazy loading może wyrzucić wyjątek.',
  '@Transactional działa tylko z @Repository — bez tej kombinacji JPA nie może działać poprawnie':'@Transactional działa na @Service, @Component, @Controller — wszędzie. @Repository to tylko stereotyp dla warstwy dostępu do danych.'
},
exp:'Bez @Transactional: findById() otwiera transakcję, zamyka. Potem update() otwiera nową transakcję, zamyka. Nie ma dirty checking — zmiany encji nie są automatycznie zapisywane. Nie można lazy-loadować poza metodą. Z @Transactional: jedna transakcja na całą metodę, dirty checking aktywny, lazy loading dostępny w granicach metody.'
},

{cat:'spring',type:'single',

  'Wzorzec projektowy polegający na dynamicznym dodawaniu pól do obiektów w trakcie działania',
  'Mechanizm automatycznego testowania kodu przez wstrzykiwanie asercji do metod produkcyjnych'
],
cor:'Technika modularyzacji cross-cutting concerns (logowanie, bezpieczeństwo, transakcje) przez aspekty przechwytujące wywołania metod bez modyfikacji ich kodu',
wrong:{
  'Paradygmat programowania gdzie każda klasa może mieć co najwyżej jeden aspekt odpowiedzialności':'To błędna interpretacja SRP (Single Responsibility Principle). AOP to nie ograniczenie liczby odpowiedzialności, ale wydzielenie przekrojowych zagadnień.',
  'Wzorzec projektowy polegający na dynamicznym dodawaniu pól do obiektów w trakcie działania':'To opis reflection lub bytecode manipulation. AOP dotyczy przechwytywania wywołań metod, nie modyfikacji struktury obiektów.',
  'Mechanizm automatycznego testowania kodu przez wstrzykiwanie asercji do metod produkcyjnych':'To opis contract testing lub defensive programming. AOP to technika produkcyjna dla cross-cutting concerns, nie testowania.'
},
exp:'Cross-cutting concerns: logowanie, @Transactional, @Cacheable, @Secured, @Async. Bez AOP: każda metoda serwisowa sama zarządza transakcją, logowaniem, uprawnieniami → duplikacja. Z AOP: Spring opakowuje bean w proxy, proxy przechwytuje wywołanie, wykonuje "before/after" advice. Ograniczenie Spring AOP: tylko public metody Spring beanów przez proxy — nie bytecode weaving jak AspectJ.'
},

{cat:'spring',type:'single',
q:'Co to są Profile w Spring Boot i do czego służą?',
opts:[
  'Profile to konfiguracja wydajności JVM optymalizująca Spring Boot pod różne środowiska sprzętowe',

  'Atak polegający na wstrzykiwaniu złośliwych zapytań SQL do formularzy webowych w celu wyciągnięcia danych z bazy':'To opis SQL Injection. XSS dotyczy wstrzykiwania kodu JavaScript do stron HTML, nie zapytań do bazy danych.',
  'Atak na serwer DNS podmieniający adresy IP dla popularnych domen na złośliwe serwery':'To opis DNS spoofing lub DNS cache poisoning. XSS to atak po stronie klienta na przeglądarkę.',
  'Przechwytywanie ruchu HTTPS przez fałszywe certyfikaty SSL zainstalowane w przeglądarce':'To opis ataku SSL stripping lub MITM z fałszywym certyfikatem. XSS to wstrzykiwanie kodu, nie przechwytywanie ruchu.'
},
exp:'Rodzaje XSS: Stored (złośliwy skrypt zapisany w DB, wyświetlany wszystkim), Reflected (skrypt w URL, wykonywany dla klikającego), DOM-based (manipulacja DOM bez serwera). Obrona: Output encoding (escape < jako &lt; etc.), Content Security Policy (CSP), httpOnly cookies (XSS nie może ukraść tokenu), sanitizacja HTML (DOMPurify). React auto-escape po default.'
},

],
cor:'JSON Web Token — samodzielny, podpisany token zawierający claims (dane) użytkownika w payload; wygasa po czasie zdefiniowanym w polu exp (Unix timestamp)',
wrong:{
  'JWT to format bazy danych przechowujący dane sesji użytkownika po stronie serwera':'JWT jest stateless — dane są w tokenie, nie w bazie. Sesja po stronie serwera to tradycyjny model (session store). JWT eliminuje potrzebę przechowywania sesji.',
  'JWT to zaszyfrowane hasło użytkownika transmitowane przy każdym żądaniu HTTP w nagłówku Authorization':'Hasło NIGDY nie powinno być w JWT. JWT zawiera claims (sub, role, exp) — nie hasło. JWT jest podpisany, nie zaszyfrowany (chyba że JWE).',
  'JWT to identyfikator sesji generowany przez serwer i przechowywany w bazie danych':'To opis session token (opaque token). JWT jest self-contained — serwer może zweryfikować token bez bazy danych (przez weryfikację podpisu).'
},
exp:'Struktura JWT: header (alg: RS256) + payload (sub: userId, exp: 1735689600, roles: [ADMIN]) + signature. Weryfikacja: serwer sprawdza podpis kluczem publicznym — brak zapytania do DB. exp: Unix timestamp (sekundy od 1970-01-01). Krótki TTL access tokenu (15min-1h) + długi refresh token (7-30 dni). Brak możliwości unieważnienia przed exp — używaj krótkich tokenów lub token revocation list.'
},

  'Baza danych specjalizowana w przechowywaniu dużych plików binarnych i strumieniowaniu mediów',

cor:'Pośrednik przyjmujący wiadomości od producentów i dostarczający je do konsumentów — oddziela nadawcę od odbiorcy i zapewnia asynchroniczną komunikację',
wrong:{
  'Serwer HTTP pośredniczący między klientem a serwerem w celu buforowania odpowiedzi':'To opis reverse proxy lub CDN (np. Nginx, Varnish). Message broker to warstwa asynchroniczna oparta na kolejkach/tematach, nie HTTP proxy.',
  'Baza danych specjalizowana w przechowywaniu dużych plików binarnych i strumieniowaniu mediów':'To opis object storage (S3) lub CDN streamingowego. Message broker przechowuje tymczasowo wiadomości do przetworzenia, nie pliki medialne.',
  'Narzędzie do monitorowania ruchu sieciowego między mikroserwisami w klastrze':'To opis service mesh (Istio) lub APM (Dynatrace). Message broker to infrastruktura do asynchronicznej komunikacji.'

{cat:'communication',type:'single',
q:'Co to jest synchroniczna vs asynchroniczna komunikacja między serwisami?',
opts:[
  'Synchroniczna komunikacja używa HTTP, asynchroniczna używa HTTPS — różnica tylko w szyfrowaniu',
  'Synchroniczna: wywołujący czeka na odpowiedź (HTTP/REST, gRPC); asynchroniczna: wywołujący wysyła wiadomość i nie czeka — przetwarzanie w tle (Kafka, RabbitMQ)',
  'Synchroniczna komunikacja działa tylko w sieci lokalnej, asynchroniczna przez internet',
  'Synchroniczna używa JSON, asynchroniczna używa binarnych formatów jak Protobuf'
],
cor:'Synchroniczna: wywołujący czeka na odpowiedź (HTTP/REST, gRPC); asynchroniczna: wywołujący wysyła wiadomość i nie czeka — przetwarzanie w tle (Kafka, RabbitMQ)',
wrong:{
  'Synchroniczna komunikacja używa HTTP, asynchroniczna używa HTTPS — różnica tylko w szyfrowaniu':'HTTP i HTTPS mogą być używane zarówno synchronicznie jak i asynchronicznie. Różnica sync/async nie zależy od szyfrowania.',
  'Synchroniczna komunikacja działa tylko w sieci lokalnej, asynchroniczna przez internet':'Oba typy komunikacji działają zarówno lokalnie jak i przez internet. To nie jest kryterium rozróżnienia.',
  'Synchroniczna używa JSON, asynchroniczna używa binarnych formatów jak Protobuf':'Format danych (JSON, Protobuf, Avro) jest niezależny od modelu sync/async. Kafka może używać JSON, REST może używać Protobuf.'
},
exp:'Synchroniczna (REST/gRPC): wątek wywołujący blokuje się i czeka. Prosta, łatwa do debugowania, ale: coupling (obie strony muszą być dostępne), problemy z latencją, cascading failures. Asynchroniczna (Kafka/RabbitMQ): wątek nie blokuje, przetwarzanie w tle. Zalety: decoupling, odporność, skalowalność. Wady: eventual consistency, trudniejsze debugowanie. Wybór: natychmiastowa odpowiedź → sync; długie procesy, duże obciążenie → async.'
},

  'Framework do testów wydajnościowych mierzący throughput i latencję aplikacji pod obciążeniem':'To opis load testing (JMeter, Gatling, k6). APM monitoruje produkcję w czasie rzeczywistym, a nie testy syntetyczne.'
},
exp:'APM zbiera: czasy odpowiedzi per endpoint, error rate i typy błędów, distributed traces (gdzie spędza czas zapytanie), database query times (N+1 detection), external service calls, JVM metrics (heap, GC, threads). Automatyczna instrumentacja: agent wstrzykuje kod przez Java Agent (-javaagent:). Korzyść: wykrycie wąskich gardeł w produkcji bez kodu monitorującego w aplikacji.'
},

{cat:'observability',type:'single',
q:'Co to jest log aggregation i dlaczego jest niezbędna w architekturze mikroserwisów?',
opts:[
  'Log aggregation to kompresja logów w celu zmniejszenia zużycia dysku na serwerach produkcyjnych',
  'Centralne zbieranie logów ze wszystkich serwisów w jedno miejsce — bez tego debugowanie wymaga SSH na każdy serwis osobno i ręcznego przeszukiwania plików',
  'Automatyczne generowanie raportów biznesowych na podstawie logów transakcyjnych aplikacji',
  'Synchronizacja logów między środowiskiem dev i prod w celu odtworzenia błędów produkcyjnych lokalnie'
],
cor:'Centralne zbieranie logów ze wszystkich serwisów w jedno miejsce — bez tego debugowanie wymaga SSH na każdy serwis osobno i ręcznego przeszukiwania plików',
wrong:{
  'Log aggregation to kompresja logów w celu zmniejszenia zużycia dysku na serwerach produkcyjnych':'Kompresja to osobna kwestia (gzip, retention policies). Aggregation to centralizacja — zbieranie w jedno miejsce, nie kompresja.',
  'Automatyczne generowanie raportów biznesowych na podstawie logów transakcyjnych aplikacji':'Raporty biznesowe to business intelligence (BI). Log aggregation to operacyjne zbieranie logów dla debugowania i monitorowania.',
  'Synchronizacja logów między środowiskiem dev i prod w celu odtworzenia błędów produkcyjnych lokalnie':'To nie standard practice (dane prod na dev = ryzyko GDPR). Log aggregation to centralizacja logów produkcyjnych w jednym narzędziu.'
},
exp:'Problem: 50 mikroserwisów × 10 instancji = 500 miejsc z logami. 1 żądanie wchodzi do api-gateway, idzie przez 5 serwisów. Znalezienie błędu = SSH na każdy serwis + grep. Z log aggregation (ELK Stack / Grafana Loki): jeden interfejs, search po correlation_id, dashboardy. Stack: Fluentd/Filebeat (agent zbierający) → Elasticsearch/Loki (magazyn) → Kibana/Grafana (UI).'
},


];

const CAT={
  architecture:{l:'🏛 Architektura',c:'#7c3aed',b:'#2d1b69'},
  patterns:{l:'🔁 Patterns',c:'#0891b2',b:'#0c2a35'},
  jpa:{l:'💾 JPA',c:'#d97706',b:'#2a1a00'},
  spring:{l:'🍃 Spring Boot',c:'#16a34a',b:'#052e16'},
  databases:{l:'🗄 Databases',c:'#9333ea',b:'#2a0a4a'},
  java:{l:'☕ Java',c:'#ea580c',b:'#2d0f00'},
  security:{l:'🔐 Security',c:'#dc2626',b:'#2d0a0a'},
  communication:{l:'📡 Communication',c:'#0284c7',b:'#0a1f2d'},
  kubernetes:{l:'🚀 Kubernetes',c:'#4f46e5',b:'#1a1650'},
  observability:{l:'📊 Observability',c:'#059669',b:'#022c22'},
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let activeCat=new Set(Object.keys(CAT));
let deck=[],idx=0,answered=false;
let curShuffled=[],curCorrectIdx=new Set(),selIdx=new Set();
let stats={t:0,c:0,w:0};

document.getElementById('tc').textContent=Q.length;

function filtered(){return shuffle(Q.filter(q=>activeCat.has(q.cat)));}
function updStats(){
  document.getElementById('st').textContent=stats.t;
  document.getElementById('sc').textContent=stats.c;
  document.getElementById('sw').textContent=stats.w;
  const p=stats.t>0?Math.round(stats.c/stats.t*100):null;
  document.getElementById('sp').textContent=p!==null?p+'%':'–';
}
function buildFB(){
  const bar=document.getElementById('fb');bar.innerHTML='';
  const allA=activeCat.size===Object.keys(CAT).length;
  const ab=document.createElement('button');
  ab.className='fb'+(allA?' active':'');
  ab.textContent=`Wszystkie (${Q.length})`;
  if(allA){ab.style.borderColor='#7dd3fc';ab.style.color='#7dd3fc';}
  ab.onclick=()=>{activeCat=new Set(Object.keys(CAT));restart();};
  bar.appendChild(ab);
  Object.entries(CAT).forEach(([k,v])=>{
    const cnt=Q.filter(q=>q.cat===k).length;
    const b=document.createElement('button');
    const act=activeCat.has(k);
    b.className='fb'+(act?' active':'');
    b.textContent=`${v.l} (${cnt})`;
    if(act){b.style.borderColor=v.c;b.style.color=v.c;b.style.background=v.b;}
    b.onclick=()=>{if(activeCat.has(k)){if(activeCat.size>1)activeCat.delete(k);}else activeCat.add(k);restart();};
    bar.appendChild(b);
  });
}
function restart(){deck=filtered();idx=0;answered=false;selIdx.clear();buildFB();render();}
function render(){
  const card=document.getElementById('card');
  if(idx>=deck.length){
    card.innerHTML=`<div class="end"><div style="font-size:2.8rem">🎉</div><h2 style="color:#4ade80;margin:10px 0 7px">Koniec tali!</h2><p style="color:#94a3b8;margin-bottom:20px">Przeszedłeś ${deck.length} pytań.</p><button class="btn bp" onclick="restart()">🔄 Tasuj ponownie</button></div>`;
    return;
  }
  const q=deck[idx];const cat=CAT[q.cat];
  curShuffled=shuffle(q.opts);
  if(q.type==='single'){
    curCorrectIdx=new Set([curShuffled.indexOf(q.cor)]);
  } else {
    curCorrectIdx=new Set(q.cor.map(c=>curShuffled.indexOf(c)));
  }
  selIdx=new Set();
  card.innerHTML=`
    <div class="badge" style="background:${cat.b};color:${cat.c};border:1px solid ${cat.c}">${cat.l}</div>
    <div class="qnum">Pytanie ${idx+1} / ${deck.length}</div>
    <div class="question" id="qq"></div>
    <div id="mh" class="mhint" style="display:${q.type==='multi'?'block':'none'}">⚠️ Wielokrotny wybór — zaznacz WSZYSTKIE poprawne odpowiedzi</div>
    <div class="options" id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="actions">
      <button class="btn bp" id="bc" onclick="check()" disabled>Sprawdź</button>
      <button class="btn bs" id="bn" onclick="next()" style="display:none">Następne →</button>
      <span class="di">${idx+1} / ${deck.length}</span>
    </div>`;
  document.getElementById('qq').innerHTML=q.q;
  const ls=['A','B','C','D','E'];
  const oel=document.getElementById('opts');
  curShuffled.forEach((optText,i)=>{
    const d=document.createElement('div');d.className='opt';d.dataset.i=i;
    if(q.type==='multi'){d.innerHTML=`<div class="cb" id="cb${i}"></div><span>${optText}</span>`;}
    else{d.innerHTML=`<span class="ol">${ls[i]}.</span><span>${optText}</span>`;}
    d.onclick=()=>pick(i);oel.appendChild(d);
  });
  answered=false;
  document.getElementById('pf').style.width=(idx/deck.length*100)+'%';
}
function pick(i){
  if(answered)return;
  const q=deck[idx];const opts=document.querySelectorAll('.opt');
  if(q.type==='single'){
    selIdx.clear();opts.forEach(o=>o.classList.remove('sel'));
    selIdx.add(i);opts[i].classList.add('sel');
  } else {
    if(selIdx.has(i)){
      selIdx.delete(i);opts[i].classList.remove('sel');
      const cb=document.getElementById(`cb${i}`);
      if(cb){cb.textContent='';cb.style.background='';cb.style.borderColor='#475569';}
    } else {
      selIdx.add(i);opts[i].classList.add('sel');
      const cb=document.getElementById(`cb${i}`);if(cb)cb.textContent='✓';
    }
  }
  document.getElementById('bc').disabled=selIdx.size===0;
}
function check(){
  if(answered||selIdx.size===0)return;
  answered=true;
  const q=deck[idx];
  const opts=document.querySelectorAll('.opt');
  const ok=selIdx.size===curCorrectIdx.size&&[...selIdx].every(i=>curCorrectIdx.has(i));
  opts.forEach((opt,i)=>{
    opt.classList.add('dis');
    if(curCorrectIdx.has(i)&&selIdx.has(i))opt.classList.add('ok');
    else if(selIdx.has(i)&&!curCorrectIdx.has(i))opt.classList.add('bad');
    else if(curCorrectIdx.has(i))opt.classList.add('rev');
  });
  stats.t++;if(ok)stats.c++;else stats.w++;updStats();
  const e=document.getElementById('exp');
  let html=(ok?'✅ <strong>Poprawnie!</strong> ':'❌ <strong>Błędna odpowiedź.</strong> ')+q.exp;
  // Add wrong answer explanation if available and answer was wrong
  if(!ok && q.wrong){
    const wrongTexts=[...selIdx].map(i=>curShuffled[i]);
    const wrongExps=wrongTexts.map(t=>q.wrong[t]).filter(Boolean);
    if(wrongExps.length>0){
      html+=wrongExps.map(we=>`<div class="exp-wrong"><strong>❌ Dlaczego Twoja odpowiedź jest błędna:</strong> ${we}</div>`).join('');
    }
  }
  e.innerHTML=html;
  e.className='exp show';
  document.getElementById('bc').style.display='none';
  document.getElementById('bn').style.display='inline-block';
}
function next(){idx++;render();}
buildFB();deck=filtered();render();updStats();
</script>
</body>
</html>
