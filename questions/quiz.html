<script>
const CAT={
  architecture:{l:'🏛 Architektura',c:'#7c3aed',b:'#2d1b69'},
  patterns:{l:'🔁 Patterns',c:'#0891b2',b:'#0c2a35'},
  jpa:{l:'💾 JPA',c:'#d97706',b:'#2a1a00'},
  spring:{l:'🍃 Spring Boot',c:'#16a34a',b:'#052e16'},
  databases:{l:'🗄 Databases',c:'#9333ea',b:'#2a0a4a'},
  java:{l:'☕ Java',c:'#ea580c',b:'#2d0f00'},
  security:{l:'🔐 Security',c:'#dc2626',b:'#2d0a0a'},
  communication:{l:'📡 Communication',c:'#0284c7',b:'#0a1f2d'},
  kubernetes:{l:'🚀 Kubernetes',c:'#4f46e5',b:'#1a1650'},
  observability:{l:'📊 Observability',c:'#059669',b:'#022c22'},
};

const Q=[
// ═══════════════ ARCHITECTURE ═══════════════
{cat:'architecture',type:'single',q:'Hexagonal Architecture jest znana również jako:',opts:['Onion Architecture','Ports & Adapters','Clean Architecture','Layered Architecture'],ans:[1],exp:'<strong>Ports & Adapters</strong>: Port = technologicznie agnostyczny interfejs w rdzeniu (np. <code>UserRepository</code>). Adapter = konkretna implementacja (np. <code>UserJpaRepository</code>). Celem jest izolacja domeny od zewnętrznych szczegółów.'},
{cat:'architecture',type:'single',q:'Czym skupia się każda z architektur? (Hexagonal / Clean / Onion)',opts:['Hex→use cases; Clean→integracje; Onion→domena','Hex→integracje; Clean→use cases; Onion→domena','Hex→domena; Clean→integracje; Onion→use cases','Wszystkie skupiają się identycznie'],ans:[1],exp:'"Hexagonal asks: How does the app talk to the world? Clean asks: What does the app do (use cases)? Onion asks: What is the core business domain?"'},
{cat:'architecture',type:'single',q:'The Dependency Rule w Clean Architecture oznacza:',opts:['Zależności mogą wskazywać w dowolnym kierunku','Zależności zawsze wskazują do wewnątrz — outer layers zależą od inner, nigdy odwrotnie','Każda klasa ma jedną zależność','Zależności są zarządzane przez framework'],ans:[1],exp:'The Dependency Rule: kod z warstwy zewnętrznej może zależeć od wewnętrznej, ale nie odwrotnie. Entities nie wiedzą nic o bazach danych, UI ani frameworkach.'},
{cat:'architecture',type:'single',q:'Czym różni się Hexagonal od Clean Architecture?',opts:['Hexagonal ma więcej warstw','Clean formalizes layers; Hexagonal tells you how to communicate, not how to divide packages','Hexagonal nie używa interfejsów','Clean skupia się wyłącznie na DDD'],ans:[1],exp:'Z materiału: "Clean formalizes layers. Hexagonal tells you how to communicate, not how to divide packages." Clean narzuca warstwy (Entities→UseCases→Adapters→Frameworks), Hexagonal narzuca granicę przez porty i adaptery.'},
{cat:'architecture',type:'multi',q:'Które stwierdzenia o CQRS są PRAWDZIWE? (wielokrotny wybór)',opts:['CQRS wymaga osobnych baz danych dla odczytu i zapisu','Command zmienia stan systemu, Query tylko odczytuje','CQRS zawsze wymaga Event Sourcing','Lightweight CQRS może działać na jednej bazie','Event Sourcing prawie zawsze implikuje CQRS'],ans:[1,3,4],exp:'(B)✅ Rozdzielone odpowiedzialności. (D)✅ Lightweight CQRS = ta sama baza, różne modele. (E)✅ ES produkuje eventy idealne do projekcji read modelu. (A)❌ Osobne bazy opcjonalne. (C)❌ CQRS nie wymaga ES.'},
{cat:'architecture',type:'single',q:'W Event Sourcing — co jest "source of truth"?',opts:['Aktualny stan encji','Historia wszystkich zdarzeń (eventów)','Snapshoty co 100 eventów','Commands wysłane do systemu'],ans:[1],exp:'ES przechowuje <strong>historię zdarzeń</strong> (AccountCreated, MoneyDeposited…). Stan aktualny = replay eventów. "State is derived, not stored directly."'},
{cat:'architecture',type:'single',q:'Cel Snapshot w Event Sourcing:',opts:['Zastąpienie event store relacyjną bazą','Przyspieszenie ładowania agregatu przez ominięcie starych eventów','Backup do disaster recovery','Synchronizacja read/write modelu'],ans:[1],exp:'Gdy agregat ma tysiące eventów, replay jest wolny. Snapshot = pełny stan co N eventów. Przy ładowaniu: snapshot + tylko eventy <em>po</em> snapshocie.'},
{cat:'architecture',type:'single',q:'Aggregate w Event Sourcing to:',opts:['Widok read modelu','Granica spójności (consistency boundary) egzekwująca invarianty','Zewnętrzny serwis obsługujący eventy','Snapshot stanu domeny'],ans:[1],exp:'Aggregate: loads its events, validates command, emits new events. Does NOT modify DB tables directly. Enforces business invariants.'},
{cat:'architecture',type:'single',q:'Optimistic Locking w Event Store — mismatch wersji oznacza:',opts:['Błąd połączenia z bazą','Concurrency conflict — inny wątek zmodyfikował agregat w międzyczasie','Snapshot nieaktualny','Event store pełny'],ans:[1],exp:'Każdy agregat ma wersję. Przy zapisie: <code>expected_version == current_version</code>. Niezgodność → concurrency conflict → OptimisticLockException → retry.'},
{cat:'architecture',type:'multi',q:'Które są WADAMI mikrousług? (wielokrotny wybór)',opts:['Granularne skalowanie (zaleta)','Złożoność operacyjna (DevOps, K8s, service mesh)','Trudności z konsystencją danych (brak ACID cross-service)','Izolacja awarii (zaleta)','Wysoka latencja sieciowa między serwisami'],ans:[1,2,4],exp:'(B)✅ Setki serwisów = duże nakłady DevOps. (C)✅ Saga Pattern zamiast ACID. (E)✅ Network calls wolniejsze niż in-process. (A)(D) to ZALETY mikrousług.'},
{cat:'architecture',type:'single',q:'Full CQRS — skąd eventual consistency?',opts:['Replikacja synchroniczna','Command→Event Store→Projection→Read DB aktualizowana asynchronicznie','Load balancer','Timeouty HTTP'],ans:[1],exp:'Projekcja aktualizuje read model <strong>asynchronicznie</strong>. Zaraz po commicie command, użytkownik może zobaczyć stale data w read modelu. System musi to tolerować.'},
{cat:'architecture',type:'single',q:'Kiedy WARTO stosować CQRS?',opts:['W prostym CRUD z małym zespołem','Wysoki read/write ratio, złożona domena, potrzeba niezależnego skalowania odczytu','Panel administracyjny','Baza < 10 tabel'],ans:[1],exp:'CQRS sprawdza się przy: złożonej domenie, dużym read/write ratio, event-driven architecture, potrzebie niezależnego skalowania. NIE stosuj w prostych CRUD, małych zespołach.'},
{cat:'architecture',type:'single',q:'Kiedy NIE stosować Event Sourcing?',opts:['Gdy potrzebujesz pełnego audit log','W złożonej domenie biznesowej','W prostym CRUD bez wymagań audytowych','Gdy chcesz odtworzyć stan historyczny'],ans:[2],exp:'ES nie nadaje się do: CRUD, paneli admina, niedoświadczonego zespołu, braku wymagań audytowych. "Don\'t use it when: CRUD app, simple admin panel, no audit requirements, team not experienced."'},
{cat:'architecture',type:'single',q:'Onion Architecture — jej kluczowa zasada to:',opts:['Porty i adaptery jako główna metafora komunikacji','Concentric layers z domain model w centrum; zależności zawsze skierowane do wewnątrz','Use cases jako główny punkt wejścia do systemu','Framework jako centralny element projektu'],ans:[1],exp:'Onion Architecture: warstwy koncentryczne z <em>domain model</em> w centrum. Dependency Inversion: interfejsy definiowane przez wewnętrzne warstwy, implementowane przez zewnętrzne. Domena niezależna od infrastruktury.'},

// ═══════════════ PATTERNS ═══════════════
{cat:'patterns',type:'single',q:'Inbox Pattern — jaki problem rozwiązuje?',opts:['Atomowe zapisanie danych i opublikowanie eventu','Zapobiega wielokrotnemu przetworzeniu tej samej wiadomości (idempotency / exactly-once)','Buforuje wiadomości gdy broker jest down','Kompresuje payloady wiadomości'],ans:[1],exp:'"Inbox Pattern is used on the consumer side to ensure exactly-once processing." Broker dostarcza at-least-once → Inbox gwarantuje exactly-once przez sprawdzenie <code>message_id</code> przed wykonaniem logiki.'},
{cat:'patterns',type:'single',q:'Outbox Pattern — jaki problem rozwiązuje?',opts:['Gwarantuje opublikowanie eventu jeśli i tylko jeśli transakcja DB się powiodła','Zapobiega duplikatom po stronie konsumenta','Kompresuje wiadomości','Autoryzuje dostęp do kolejki'],ans:[0],exp:'"What if my database transaction commits, but sending the event fails?" Outbox: event zapisywany w tabeli outbox <em>w tej samej transakcji</em> co dane domenowe. Relay asynchronicznie publikuje do brokera.'},
{cat:'patterns',type:'single',q:'Outbox vs Inbox — poprawne przypisanie:',opts:['Outbox=konsument, Inbox=producent','Outbox=producent (reliable send); Inbox=konsument (reliable receive)','Oba po stronie konsumenta','Oba po stronie producenta'],ans:[1],exp:'<strong>Outbox</strong>: strona producenta — gwarantuje niezawodne wysłanie. <strong>Inbox</strong>: strona konsumenta — gwarantuje exactly-once processing. Razem eliminują problemy at-least-once delivery na obu końcach.'},
{cat:'patterns',type:'single',q:'Saga Pattern — jaki problem rozwiązuje?',opts:['Szyfrowanie danych między mikroserwisami','Data consistency across multiple services without distributed transactions','Auto-skalowanie serwisów','Cache\'owanie HTTP responses'],ans:[1],exp:'"How do I keep the system consistent when a business process spans multiple services and something fails halfway?" Saga = sekwencja lokalnych transakcji z compensation actions.'},
{cat:'patterns',type:'single',q:'Choreography vs Orchestration Saga:',opts:['Choreography ma centralny kontroler; Orchestration nie','Orchestration: centralny orchestrator steruje krokami; Choreography: serwisy reagują na eventy bez koordynatora','Są identyczne, różna implementacja','Choreography zawsze szybsza'],ans:[1],exp:'<strong>Choreography</strong>: każdy serwis reaguje na eventy ✅ Fully decoupled ⚠️ Harder to reason about flow. <strong>Orchestration</strong>: centralny kontroler ✅ Centralized control, easier debugging ⚠️ Orchestrator can become complex.'},
{cat:'patterns',type:'multi',q:'ZALETY Saga Pattern: (wielokrotny wybór)',opts:['Unika distributed transactions (2PC, XA)','Gwarantuje ACID przez cały business process','Dobrze skaluje — każdy krok to lokalna transakcja','Explicit business recovery logic (compensations)','Prostszy niż ACID transactions'],ans:[0,2,3],exp:'(A)✅ "No 2PC required." (C)✅ "Each step is a local transaction." (D)✅ "Compensations are business-defined." (B)❌ Nie ACID — eventual consistent. (E)❌ "Harder than ACID transactions."'},
{cat:'patterns',type:'single',q:'Circuit Breaker — kolejność stanów:',opts:['OPEN→CLOSED→HALF-OPEN','CLOSED→OPEN→HALF-OPEN→CLOSED','HALF-OPEN→CLOSED→OPEN','OPEN→HALF-OPEN→CLOSED→OPEN'],ans:[1],exp:'CLOSED (normalny ruch, liczenie błędów) → próg przekroczony → OPEN (fail fast, fallback) → timeout → HALF-OPEN (testowe requesty) → sukces: CLOSED / błąd: OPEN.'},
{cat:'patterns',type:'single',q:'Stan OPEN circuit breakera — co dzieje się z requestami?',opts:['Przekazywane normalnie do serwisu','Kolejkowane do ponowienia później','Natychmiast odrzucane (fail fast) — opcjonalny fallback','Przekierowane do repliki serwisu'],ans:[2],exp:'"Stop calling a failing dependency temporarily and fail fast." Stan OPEN chroni wątki i zasoby przed blokowaniem na timeoutach. Fallback = cached response, default value, degraded mode.'},
{cat:'patterns',type:'single',q:'Stan HALF-OPEN circuit breakera:',opts:['Maintenance mode — brak ruchu','Ograniczone testowe requesty; sukces→CLOSED, błąd→OPEN','Połowa wątków blokowana','Cache wypełniony w połowie'],ans:[1],exp:'"Limited test requests allowed. If successful → back to Closed. If failure → Open again." Po timeout\'cie od OPEN circuit breaker sprawdza czy serwis się naprawił.'},
{cat:'patterns',type:'single',q:'Jak działa deduplication w Inbox Pattern?',opts:['Broker sprawdza duplikaty server-side','Konsument sprawdza tabelę inbox pod kątem message_id PRZED logiką biznesową, w jednej transakcji','Producent taguje wiadomości jako processed','Hash wiadomości porównywany z poprzednimi'],ans:[1],exp:'Inbox flow: (1) odbiór wiadomości, (2) sprawdź <code>message_id</code> w tabeli inbox, (3) jeśli nowy: INSERT do inbox + logika biznesowa w <strong>jednej atomowej transakcji</strong>, (4) ACK do brokera. Znany → skip.'},
{cat:'patterns',type:'single',q:'Cascading failure — jaki problem rozwiązuje Circuit Breaker?',opts:['Zbyt wiele requestów do message brokera','Niedostępny downstream blokuje wątki callera, rozszerzając awarię na cały system','Baza nie może obsłużyć concurrent reads','Sieć przeciążona przez duże payloady'],ans:[1],exp:'Bez CB: A woła B (slow/down), wątki A blokują się na timeoutach, pula wątków wyczerpana, A niedostępny dla C → cascade. CB przerywa łańcuch przez fail-fast.'},
{cat:'patterns',type:'single',q:'Outbox jako persistent buffer — gdy broker jest niedostępny:',opts:['Musi być zawsze dostępny — inaczej transakcja failuje','Eventy bezpiecznie czekają w tabeli outbox w DB; relay retry po przywróceniu brokera','Kompresuje eventy','Zastępuje brokera na stałe'],ans:[1],exp:'"If the message broker is temporarily down, the outbox acts as a persistent buffer until the connection is restored." Dane domenowe już zapisane — bez ryzyka utraty.'},

// ═══════════════ JPA ═══════════════
{cat:'jpa',type:'single',q:'JPA vs Hibernate — jaka różnica?',opts:['JPA to implementacja, Hibernate to specyfikacja','JPA to specyfikacja (co robić), Hibernate to implementacja (jak robić)','Są synonimami','JPA jest szybsze niż Hibernate'],ans:[1],exp:'"JPA is NOT an implementation. Hibernate IS an implementation." JPA definiuje: adnotacje, EntityManager API, JPQL, lifecycle rules. Hibernate, EclipseLink to konkretne implementacje JPA.'},
{cat:'jpa',type:'single',q:'Persistence Context — co to jest?',opts:['Plik konfiguracyjny persistence.xml','Cache L1: first-level cache zarządzający encjami i ich lifecycle w ramach jednej sesji/transakcji','Globalny cache L2 współdzielony między sesjami','Connection pool do bazy danych'],ans:[1],exp:'"A first-level cache that tracks entity state and manages synchronization with the database." Gwarancja identity: ten sam ID w jednym PC = ta sama instancja Java (<code>u1 == u2</code> → true).'},
{cat:'jpa',type:'single',q:'Dirty Checking — jak działa?',opts:['Sprawdzanie błędów SQL przy flush','JPA na flush porównuje aktualny stan managed encji ze snapshote\'m i generuje UPDATE automatycznie','Walidacja @NotNull i @Size przed zapisem','Czyszczenie cache L2 przy commit'],ans:[1],exp:'"On flush: compares current state with snapshot taken when it was loaded → generates UPDATE if changed." Działa tylko dla managed entities. Detached entities NIE są śledzone.'},
{cat:'jpa',type:'single',q:'Różnica flush() vs commit() w JPA:',opts:['flush() zatwierdza transakcję, commit() synchronizuje','flush() wysyła SQL do DB (transakcja trwa); commit() zatwierdza transakcję (dane trwałe i widoczne dla innych)','Są synonimami','flush() czyści cache'],ans:[1],exp:'<strong>flush()</strong>: "Executes SQL, does NOT commit transaction, can happen multiple times." <strong>commit()</strong>: "Ends transaction, makes changes permanent, implicitly triggers flush first."'},
{cat:'jpa',type:'single',q:'LazyInitializationException — kiedy i dlaczego?',opts:['EAGER fetch na kolekcji >100 elementów','Próba dostępu do LAZY kolekcji po zamknięciu Persistence Context — brak aktywnej sesji do załadowania','Brak adnotacji @Entity','merge() na detached encji'],ans:[1],exp:'"Hibernate tries to initialize a lazy association, but there is no active persistence context available." Typowo: encja zwrócona z transakcji, dostęp do LAZY relacji w kontrolerze. Fix: JOIN FETCH, @EntityGraph, DTO.'},
{cat:'jpa',type:'single',q:'Co sprawia że encja staje się Detached?',opts:['Wywołanie persist()','Zamknięcie EntityManager, em.detach(), em.clear(), koniec transakcji','Wywołanie remove()','Flush bez commitu'],ans:[1],exp:'"Entity becomes detached when: Transaction ends, EntityManager closed, Explicit em.detach(), Persistence context cleared. After that: No lazy loading possible."'},
{cat:'jpa',type:'single',q:'N+1 Problem — przykład i fix:',opts:['N+1 insertów przy batch save','1 query ładuje N encji, potem N osobnych queries ładuje ich asocjacje; fix: JOIN FETCH, @EntityGraph, batch fetching','Limit połączeń w connection pool','Mapowanie N kolumn na 1 pole encji'],ans:[1],exp:'"1 query for users, N queries for orders = N+1 total." Przykład: <code>repo.findAll()</code> + <code>users.forEach(u→u.getOrders().size())</code>. Fix: <code>SELECT u FROM User u JOIN FETCH u.orders</code>.'},
{cat:'jpa',type:'multi',q:'Stany encji JPA — które są POPRAWNIE opisane? (wielokrotny wybór)',opts:['Transient — nowa encja, brak ID, niezarządzana przez PC','Managed — PC śledzi, dirty checking aktywny','Detached — aktywnie śledzona po zamknięciu sesji','Removed — zaplanowana do DELETE przy flush'],ans:[0,1,3],exp:'(A)✅ Transient: <code>new User()</code>, brak PC. (B)✅ Managed: dirty checking. (D)✅ Removed: DELETE przy flush. (C)❌ Detached NIE jest śledzona — stąd LazyInitializationException.'},
{cat:'jpa',type:'single',q:'Domyślna strategia fetch dla @OneToMany:',opts:['EAGER','LAZY','BATCH','JOIN'],ans:[1],exp:'"Default for @OneToMany: LAZY. Default for @ManyToOne / @OneToOne: EAGER." Używaj LAZY + JOIN FETCH gdy potrzebujesz danych, zamiast EAGER który może generować N+1.'},
{cat:'jpa',type:'single',q:'@Version (Optimistic Locking) — jak działa?',opts:['Blokuje rekord w DB na czas transakcji','UPDATE WHERE id=? AND version=?; 0 rows updated = ktoś zmodyfikował → OptimisticLockException','Auto-retry przy konflikcie','Blokuje cały EntityManager'],ans:[1],exp:'"When updating: UPDATE user SET name=?, version=version+1 WHERE id=? AND version=? If version changed: 0 rows updated → OptimisticLockException." Prevents lost updates without DB-level locking.'},
{cat:'jpa',type:'single',q:'CascadeType.ALL — niebezpieczeństwo:',opts:['Brak — cascade jest zawsze bezpieczny','REMOVE w cascade może spowodować niezamierzone masowe usuwanie danych','Spowalnia wszystkie operacje','Blokuje inne transakcje'],ans:[1],exp:'"Danger: accidental massive deletes, unexpected DB writes." CascadeType.ALL = {PERSIST, MERGE, REMOVE, REFRESH, DETACH}. Szczególnie niebezpieczne REMOVE — usuwa wszystkie dzieci razem z rodzicem.'},
{cat:'jpa',type:'single',q:'Dlaczego JPA nie jest dobre do batch processing?',opts:['Nie obsługuje SQL','PC rośnie w pamięci, dirty checking kosztowny dla dużych zbiorów, brak domyślnego batching','Za wolny dla >100 rekordów','Brak transakcji'],ans:[1],exp:'"JPA is optimized for domain modeling, not high-volume bulk data operations." Problemy: (1) Large PC → memory, (2) Each entity tracked → overhead, (3) Default: many individual SQLs. Fix: JDBC dla bulk, em.clear() periodically, batch size config.'},
{cat:'jpa',type:'single',q:'EntityManager — dlaczego nie jest thread-safe?',opts:['Ze względów historycznych','Trzyma mutable state (PC, managed entities, transaction state) zakładając single-threaded access','Jest thread-safe — Spring zarządza','Zbyt wolny przy wielu wątkach'],ans:[1],exp:'"EntityManager is not thread-safe because it maintains mutable state (persistence context) that assumes single-threaded transactional access." W Spring: EM jest proxied i bound to transaction — effectively thread-confined.'},
{cat:'jpa',type:'single',q:'Fetch Join na dużych kolekcjach — potencjalny problem:',opts:['Wolniejszy niż LAZY','Cartesian explosion — iloczyn kartezjański przy wielu JOIN FETCH na kolekcjach + IllegalStateException przy >1 collection fetch join','Brak wsparcia w Hibernate','Nie działa z paginacją'],ans:[1],exp:'"Fetch join on large collections → Cartesian explosion. Multiple fetch joins on collections → illegal." Rozwiązanie: jeden JOIN FETCH na raz, lub @EntityGraph, lub osobne queries.'},

// ═══════════════ SPRING BOOT ═══════════════
{cat:'spring',type:'single',q:'IoC (Inversion of Control) w Spring:',opts:['Klasa sama tworzy swoje zależności przez new()','Framework zarządza tworzeniem, wstrzykiwaniem i lifecycle beanów — "the container builds it"','Interfejs do obsługi wyjątków','Protokół komunikacji mikroserwisów'],ans:[1],exp:'"Your application does not build itself. The container builds it." Spring: skanuje klasy, buduje dependency graph, tworzy beany, wstrzykuje zależności. Ty deklarujesz co potrzebujesz, Spring to dostarcza.'},
{cat:'spring',type:'single',q:'Preferowany rodzaj wstrzykiwania zależności i dlaczego:',opts:['Field injection — najprostsze w kodzie','Constructor injection — immutability (final fields), testability, circular dependency widoczny od razu','Setter injection — największa elastyczność','Method injection — najlepsza wydajność'],ans:[1],exp:'"Constructor injection is preferred: immutability, testability, no circular dependency at runtime." Field injection wymaga refleksji, ukrywa zależności, utrudnia testowanie bez kontenera.'},
{cat:'spring',type:'single',q:'JDK Dynamic Proxy vs CGLIB:',opts:['JDK gdy bean final; CGLIB gdy implementuje interfejs','JDK gdy bean implementuje interfejs → proxy też go implementuje; CGLIB gdy nie → proxy to subclass','CGLIB zawsze — bezpieczniej','JDK dla singletonów; CGLIB dla prototypów'],ans:[1],exp:'"JDK Dynamic Proxy: If bean implements interface. CGLIB: If no interface." CGLIB tworzy podklasę w runtime — dlatego nie może proxy <code>final</code> metod.'},
{cat:'spring',type:'multi',q:'Kiedy @Transactional NIE zadziała? (wielokrotny wybór)',opts:['Wywołanie przez interfejs innej klasy — zadziała normalnie','Self-invocation: this.method() w tej samej klasie','Prywatna metoda','Final metoda (CGLIB)','Wywołanie z innego wątku (@Async)'],ans:[1,2,3,4],exp:'(B)✅ Self-invocation omija proxy. (C)✅ "Spring AOP works only on public methods." (D)✅ CGLIB nie może override final. (E)✅ Transakcje bound to ThreadLocal. (A) przez interfejs działa normalnie.'},
{cat:'spring',type:'single',q:'REQUIRES_NEW propagation:',opts:['Dołącza do istniejącej transakcji','Zawiesza outer transakcję, otwiera nową niezależną; rollback outer NIE cofa inner (już committed)','Wykonuje bez transakcji','Rzuca wyjątek gdy transakcja już istnieje'],ans:[1],exp:'"Suspend current, create completely new one. If outer transaction fails, inner committed one stays committed." Używane do audit log, logowania które musi przetrwać rollback głównej transakcji.'},
{cat:'spring',type:'single',q:'MANDATORY propagation — brak aktywnej transakcji:',opts:['Tworzy nową automatycznie','Rzuca IllegalTransactionStateException','Wykonuje metodę bez transakcji','Czeka na transakcję z innego wątku'],ans:[1],exp:'"Must run inside existing transaction. If none exists → throws IllegalTransactionStateException." Przydatne do walidacji że wywołujący poprawnie otworzył transakcję.'},
{cat:'spring',type:'single',q:'Dirty Read — co to i jak zapobiegać?',opts:['A czyta dwa razy różne wartości; REPEATABLE_READ','B czyta niezatwierdzone dane A; jeśli A rollback — B widziała "duchy"; zapobiega READ_COMMITTED+','A widzi nowe wiersze B; SERIALIZABLE','Dwie transakcje nadpisują tę samą wartość'],ans:[1],exp:'"Transaction B reads uncommitted data of A. If A rolls back → B saw data that never existed." Prevented by: READ_COMMITTED and higher.'},
{cat:'spring',type:'single',q:'Non-Repeatable Read:',opts:['B czyta uncommitted data A','A czyta ten sam wiersz dwa razy i widzi różne wartości (B zatwierdził UPDATE między odczytami A)','A widzi nowe wiersze wstawione przez B','Deadlock między transakcjami'],ans:[1],exp:'"Transaction A reads row. Transaction B updates + commits. Transaction A reads again → sees different value." Prevented by: REPEATABLE_READ+.'},
{cat:'spring',type:'single',q:'Phantom Read:',opts:['Niezatwierdzone dane','Wiersz zmienia wartość','A wykonuje query z warunkiem, B INSERT nowy pasujący wiersz, A powtarza query — widzi nowy wiersz','Deadlock'],ans:[2],exp:'"Transaction A: SELECT * WHERE price > 100. Transaction B inserts new matching row. Transaction A runs same query → sees extra row (phantom)." Prevented by: SERIALIZABLE.'},
{cat:'spring',type:'single',q:'@Transactional — kiedy NIE będzie rollback (domyślnie)?',opts:['RuntimeException','Error','Checked Exception (np. IOException, SQLException)','NullPointerException'],ans:[2],exp:'"By default: RuntimeException → rollback. Checked Exception → NO rollback." Fix: <code>@Transactional(rollbackFor = Exception.class)</code>. Pułapka: łapanie wyjątku w try-catch bez re-throw.'},
{cat:'spring',type:'single',q:'Self-invocation problem — jak rozwiązać?',opts:['@Transactional na każdej metodzie','Przenieść metodę do osobnego beana LUB self-injection (@Autowired MyService self; → self.method())','Ręczny TransactionManager','Użyć REQUIRES_NEW'],ans:[1],exp:'Self-invocation omija proxy (this.method() != proxy.method()). Rozwiązania: (1) Osobny bean — Spring wstrzykuje proxy. (2) Self-injection: <code>@Autowired MyService self;</code> → <code>self.transactionalMethod()</code>.'},
{cat:'spring',type:'single',q:'AOP w Spring — ograniczenia:',opts:['Działa na wszystkich metodach Spring beanów','Tylko public metody Spring beanów; via proxy (nie bytecode); nie intercepts constructors ani private/static','Modyfikuje bytecode jak AspectJ','Działa bez Spring beanów'],ans:[1],exp:'"Spring AOP works only on public methods, only on Spring beans, via proxies, only at runtime." Nie modyfikuje bytecode (w odróżnieniu od AspectJ). Dlatego @Transactional na private metodzie nie działa.'},
{cat:'spring',type:'single',q:'Singleton scope — czy jest thread-safe?',opts:['Tak, Spring synchronizuje dostęp','Nie domyślnie — jedna instancja shared między wątkami; mutable state = race condition','Tak, zawsze','Zależy od JVM'],ans:[1],exp:'"Singleton scope: One per container. NOT thread-safe by default (one object shared by many threads)." Bezstanowe beany są thread-safe. Mutable field w singletonie = problem przy concurrent requests.'},
{cat:'spring',type:'single',q:'@TransactionalEventListener(phase=AFTER_COMMIT):',opts:['Wywołany zaraz po publish eventu','Wywołany po pomyślnym commit outer transakcji — gwarancja że dane trwałe w DB','Wywołany przed startem transakcji','Przy każdym flush()'],ans:[1],exp:'"Runs AFTER_COMMIT — guarantees data is persistent in DB before handler executes." Inne fazy: BEFORE_COMMIT, AFTER_ROLLBACK, AFTER_COMPLETION.'},

// ═══════════════ DATABASES ═══════════════
{cat:'databases',type:'single',q:'Optimistic vs Pessimistic Locking:',opts:['Optimistic blokuje rekord; Pessimistic sprawdza wersję','Optimistic: brak blokady, sprawdza wersję przy write (rare conflicts); Pessimistic: SELECT FOR UPDATE blokuje rekord od razu (likely conflicts)','Są synonimami','Optimistic tylko dla write-heavy systems'],ans:[1],exp:'"Optimistic: Conflicts are rare. No lock held while reading." "Pessimistic: Conflicts are likely. Data is locked immediately." Optimistic: high concurrency, requires retry. Pessimistic: strong consistency, blocking, deadlocks.'},
{cat:'databases',type:'single',q:'Connection Pool — dlaczego ważny?',opts:['Cache SQL queries','Gotowe połączenia reużywane zamiast tworzenia nowych — opening DB connection is expensive (TCP, auth)','Load balancer replik','Async write buffer'],ans:[1],exp:'"A connection pool is a cache of open DB connections. Opening a DB connection is expensive." HikariCP (domyślny w Spring Boot): pool N połączeń, thread bierze wolne, używa, oddaje. Bez pool: DB overwhelmed, latency spikes.'},
{cat:'databases',type:'single',q:'B-Tree index — dlaczego nie zwykłe binary tree?',opts:['Binary tree jest wolniejsze dla małych zbiorów','Binary tree: zbyt głębokie, zbyt wiele pointer jumps, terrible for disks; B-Tree: shallow (3-4 levels), disk-friendly','Są identyczne pod kątem wydajności','Binary tree nie wspiera range queries'],ans:[1],exp:'"Classic binary tree: Too deep, too many pointer jumps, terrible for disks/SSDs." B-Tree: balanced, all leaves at same depth, very shallow (3-4 levels even for millions of rows). Designed to minimize disk reads, not comparisons.'},
{cat:'databases',type:'multi',q:'Indeksy DB — które stwierdzenia są PRAWDZIWE? (wielokrotny wybór)',opts:['Przyspiesza SELECT — O(log N) zamiast O(N)','Spowalnia INSERT/UPDATE/DELETE — musi aktualizować indeks','Więcej indeksów = zawsze lepsza wydajność','Na kolumnie z niską selektywnością (boolean) może być bezużyteczny'],ans:[0,1,3],exp:'(A)✅ Index lookup zamiast full scan. (B)✅ "Cost of index = write amplification." (D)✅ Optimizer wybierze full scan dla kolumny z 2 wartościami. (C)❌ "Common mistake: indexing everything."'},
{cat:'databases',type:'single',q:'Kiedy NIE zakładać indeksu? (Rule of thumb)',opts:['Nigdy — indeksy zawsze pomagają','Frequent writes, low-selectivity columns; "Index columns you filter by, not columns you display"','Na kolumnach w WHERE','Na kluczach JOIN'],ans:[1],exp:'"What indexes are bad for: Frequent writes, Low-selectivity columns (boolean, small enums). Common mistakes: Indexing everything." Rule: "Index columns you filter by, not columns you display."'},
{cat:'databases',type:'single',q:'Partitioning vs Sharding:',opts:['Są synonimami','Partitioning: logiczny podział wewnątrz jednej DB (transparent); Sharding: fizyczny podział na wiele DB (application-aware, network)','Partitioning=vertical; Sharding=horizontal','Partitioning tylko dla tabel; Sharding tylko dla indeksów'],ans:[1],exp:'"Partitioning → inside one DB. Sharding → across databases." Partitioning = DB feature. Sharding = system architecture decision. Sharding komplikuje JOINy, transactions, global constraints.'},
{cat:'databases',type:'single',q:'Keyset (cursor) pagination vs OFFSET:',opts:['OFFSET szybszy','Keyset: WHERE id > cursor LIMIT N — O(log N), index-friendly, stable; OFFSET: skanuje wszystkie poprzednie wiersze — O(N), wolne przy dużych offsetach','Są identyczne','OFFSET lepszy dla produkcji'],ans:[1],exp:'"OFFSET pagination: SELECT * FROM orders LIMIT 20 OFFSET 100 → Slow for large offsets, Unstable with inserts." "Keyset: SELECT * FROM orders WHERE id > 100 ORDER BY id LIMIT 20 → Fast, Stable, Index-friendly. Always prefer keyset in production."'},
{cat:'databases',type:'single',q:'Sharding — co się psuje gdy shardujemy?',opts:['Nic — sharding tylko dodaje korzyści','JOIN cross-shard niemożliwy, ACID transactions cross-shard trudne, global unique constraints nieegzekwowalne','Tylko replikacja jest trudniejsza','Tylko większy koszt storage'],ans:[1],exp:'"What breaks when you shard: Joins across shards (not possible natively), Cross-shard transactions (slow, complex, often avoided), Global constraints (foreign keys — not enforceable globally)." Typowe rozwiązania: Saga, eventual consistency, denormalization.'},
{cat:'databases',type:'single',q:'EXPLAIN ANALYZE w PostgreSQL — do czego służy?',opts:['Restartuje query optimizer','Wykonuje zapytanie i pokazuje plan z rzeczywistymi kosztami — identyfikuje Seq Scan, missing indexes, join strategies','Automatycznie optymalizuje','Tworzy indeksy'],ans:[1],exp:'"Use EXPLAIN / EXPLAIN ANALYZE to answer: Which index is used? Sequential scan? Join order? Cost vs reality?" "Most DB problems are query or index problems, not DB problems."'},
{cat:'databases',type:'single',q:'Lost Update — co to i jak zapobiegać?',opts:['Utrata connection; retry','Dwie transakcje czytają tę samą wartość, modyfikują niezależnie — last write wins, pierwsza zmiana przepada; fix: @Version, SELECT FOR UPDATE, SERIALIZABLE','Utrata danych przy awarii; backup','Timeout transakcji; statement_timeout'],ans:[1],exp:'A czyta balance=100, B czyta balance=100, A zapisuje 90, B zapisuje 80 — zmiana A przepada. Prevented by: optimistic locking (@Version), pessimistic locking (SELECT FOR UPDATE), or proper isolation.'},
{cat:'databases',type:'single',q:'ACID — co oznacza każda litera?',opts:['Accuracy, Consistency, Integrity, Durability','Atomicity (całość albo nic), Consistency (dane spełniają constraints), Isolation (transakcje izolowane), Durability (po commit — trwałe)','Atomicity, Concurrency, Isolation, Distribution','Availability, Consistency, Integrity, Durability'],ans:[1],exp:'A=Atomicity (rollback jeśli błąd), C=Consistency (constraints spełnione po transakcji), I=Isolation (równoległe transakcje nie łamią spójności), D=Durability (po commit zapisane trwale — WAL).'},

// ═══════════════ JAVA ═══════════════
{cat:'java',type:'single',q:'Streams — lazy evaluation:',opts:['Każdy element przetwarzany natychmiast','Intermediate operations NIE są wykonywane dopóki terminal operation nie zostanie wywołana','Stream zawsze przetwarza wszystkie elementy','Lazy evaluation = parallel processing'],ans:[1],exp:'"Nothing happens until a terminal operation runs." Stream buduje pipeline ale nie wykonuje go. Terminal operations (collect, forEach, reduce) triggerują wykonanie. Korzyść: short-circuiting (findFirst może zatrzymać przetwarzanie wcześniej).'},
{cat:'java',type:'single',q:'map vs flatMap w Streams:',opts:['Są identyczne','map: 1→1 (element→element); flatMap: 1→N (element→Stream który jest "spłaszczany" do jednego streamu)','flatMap jest wolniejszy','map obsługuje Optional, flatMap nie'],ans:[1],exp:'<code>map(f)</code>: każdy element mapowany do jednego wynikowego elementu. <code>flatMap(f)</code>: każdy element mapowany do Stream, a te streamy są łączone. Przykład: <code>words.stream().flatMap(w→Arrays.stream(w.split("")))</code>'},
{cat:'java',type:'single',q:'Kiedy NIE używać parallel streams?',opts:['Nigdy — parallel zawsze szybszy','IO operations, blocking calls, shared mutable state, small datasets','Tylko przy >1000 elementów','Przy sortowaniu'],ans:[1],exp:'"When NOT to use parallel streams: IO operations, Blocking calls, Shared mutable state, Small datasets." Parallel sprawdza się dla: CPU-bound operations, large datasets, stateless operations.'},
{cat:'java',type:'single',q:'HashMap — dlaczego worst-case O(n)?',opts:['HashMap nie ma O(n)','Hash collision: wiele kluczy w tym samym bucket → linked list → O(n) lookup; Java 8+: po 8 elementach w buckecie → Tree (O(log n))','HashMap zawsze O(1)','Przy dużych zbiorach HashMap przekracza limit'],ans:[1],exp:'"Why HashMap worst-case O(n)? Hash collisions place multiple keys in same bucket. Bucket becomes a linked list. Traversal is O(n)." Java 8+: treeify threshold=8, po przekroczeniu bucket staje się Red-Black Tree → O(log n).'},
{cat:'java',type:'single',q:'ConcurrentHashMap vs Collections.synchronizedMap:',opts:['Są identyczne','ConcurrentHashMap: segment-based locking (nie blokuje całej mapy), lepsza concurrency; synchronizedMap: locks całą mapę przy każdej operacji','synchronizedMap jest szybszy','ConcurrentHashMap nie obsługuje null keys/values'],ans:[1],exp:'ConcurrentHashMap: fine-grained locking (segmenty/buckets) → wiele wątków może równocześnie pisać do różnych bucketów. Collections.synchronizedMap wraps każdą operację w <code>synchronized(mutex)</code> → single lock → bottleneck.'},
{cat:'java',type:'single',q:'Record w Java (Java 16+):',opts:['Nowy typ kolekcji','Immutable data carrier — kompilator auto-generuje: all-args constructor, accessory (x(), y()), equals, hashCode, toString; pola są final','Adnotacja do SQL mappingu','JavaBean z dodatkową walidacją'],ans:[1],exp:'"record Point(int x, int y) {}" → kompilator generuje: final fields, constructor, x(), y(), equals, hashCode, toString. Idealne dla DTO, value objects. Nie można dziedziczyć po record.'},
{cat:'java',type:'single',q:'Czy records są "truly immutable"?',opts:['Tak, zawsze','Pola są final (referencje nie zmienne), ale jeśli pole jest mutable object (np. List), stan wewnętrzny może być zmieniony — "shallow immutability"','Nie — kompilator nie wymusza immutability','Tak, ale tylko dla primitive fields'],ans:[1],exp:'"Are records truly immutable? The record fields themselves are final. But if a field is a mutable object (e.g. List), its internal state can still be changed." To shallow immutability. Dla deep immutability: użyj Collections.unmodifiableList lub kopiuj w compact constructor.'},
{cat:'java',type:'single',q:'Garbage Collector — co robi obiekt eligible?',opts:['Obiekt bez metod publicznych','Obiekt nieosiągalny od GC Roots (żadna żywa referencja nie prowadzi do obiektu)','Każdy obiekt po wywołaniu System.gc()','Obiekt starszy niż 5 minut'],ans:[1],exp:'"What Makes an Object Eligible for GC? No reference from GC Roots." GC Roots to: local variables on stack, static fields, active threads. Reference cycles SAME NIE zapobiegają GC w Javie (tracing GC, nie reference counting).'},
{cat:'java',type:'single',q:'Stop-The-World (STW) w GC:',opts:['GC zatrzymuje się gdy brak pamięci','GC wstrzymuje wszystkie wątki aplikacji na czas pewnych faz (marking, compaction) — powoduje "pause" mierzony w ms','Wątki mogą kontynuować działanie podczas GC','Dotyczy tylko G1 GC'],ans:[1],exp:'"Stop-The-World: GC pauses all application threads." Nowoczesne GC (ZGC, Shenandoah) minimalizują STW pauses do sub-millisecond. G1 GC (domyślny od Java 9): kompromis między throughput a pause times.'},
{cat:'java',type:'single',q:'JDK vs JRE vs JVM:',opts:['Są synonimami','JVM: runtime (bytecode execution, GC, JIT); JRE: JVM + stdlib (do uruchamiania); JDK: JRE + narzędzia (javac, jar, javadoc — do tworzenia)','JDK tylko dla serwerów','JVM tylko na Linuxie'],ans:[1],exp:'JVM: wykonuje bytecode, GC, JIT. JRE: JVM + java.util, java.io etc. — do uruchamiania aplikacji. JDK: JRE + javac, jshell, javadoc — do developmentu. Nowsze JDK zawierają JRE w sobie.'},
{cat:'java',type:'single',q:'JIT Compiler — dlaczego Java czasem szybsza niż C++?',opts:['Java zawsze wolniejsza','JIT kompiluje hot code do natywnego kodu z runtime profiling — może robić optymalizacje niedostępne dla statycznych kompilatorów (inline, devirtualization)','Java szybsza bo ma GC','Nie jest nigdy szybsza'],ans:[1],exp:'"Why Java sometimes faster than C++? JIT has runtime profile data. It can inline methods based on actual call frequency, devirtualize polymorphic calls, optimize based on actual memory layout." Statyczny kompilator C++ nie zna runtime behavior.'},
{cat:'java',type:'single',q:'volatile — co gwarantuje?',opts:['Atomowość operacji złożonych (np. i++)','Visibility: zapis do volatile jest widoczny dla innych wątków natychmiast; ordering: zapobiega reorderingowi wokół volatile; NIE gwarantuje atomowości złożonych operacji','Thread-safety dla wszystkich operacji','Automatyczne synchronizowanie całego obiektu'],ans:[1],exp:'volatile gwarantuje: (1) Visibility — każdy write do volatile jest od razu widoczny dla innych wątków. (2) Ordering — happens-before relationship. NIE gwarantuje: atomowości złożonych operacji (i++ = read+increment+write = 3 kroki).'},
{cat:'java',type:'single',q:'synchronized vs volatile:',opts:['Są identyczne','synchronized: mutual exclusion + visibility (locks); volatile: tylko visibility + ordering, bez locks, bez atomicity złożonych ops','volatile jest silniejszy','synchronized nie gwarantuje visibility'],ans:[1],exp:'synchronized: mutual exclusion (jeden wątek na raz), visibility, atomicity. volatile: tylko visibility i ordering, brak mutual exclusion, brak atomicity złożonych ops. volatile szybszy, synchronized bezpieczniejszy dla compound operations.'},
{cat:'java',type:'single',q:'Heap vs Stack w JVM:',opts:['Stack przechowuje obiekty; Heap primitives','Heap: obiekty i arrays (GC zarządza, shared between threads); Stack: per-thread, ramki metod (local vars, referencje), auto-zwalniany po return','Heap per-thread; Stack shared','Oba zarządzane przez GC'],ans:[1],exp:'Heap: wszystkie obiekty (<code>new</code>), zarządzany przez GC, współdzielony. Stack: per-thread, call frames, automatycznie zwalniany. StackOverflowError = zbyt głęboka rekurencja. OutOfMemoryError = brak miejsca na Heap.'},

// ═══════════════ SECURITY ═══════════════
{cat:'security',type:'single',q:'JWT — z czego się składa?',opts:['Username+Password+Timestamp','Header.Payload.Signature rozdzielone kropkami — Base64URL encoded, NIE szyfrowane','SessionID+CSRF+Expiry','PublicKey+PrivateKey+Algorithm'],ans:[1],exp:'Header: algorytm (RS256, HS256). Payload: claims (sub, exp, iat, role). Signature: kryptograficzna integralność. Base64URL — KAŻDY może odczytać payload! "JWT is NOT encrypted. It is only signed."'},
{cat:'security',type:'single',q:'JWS vs JWE — różnica:',opts:['JWS=zaszyfrowany; JWE=podpisany','JWS: header.payload.signature — payload czytelny, podpis chroni integralność; JWE: payload zaszyfrowany (5 części), poufność','JWS szybszy; JWE bezpieczniejszy','Są synonimami'],ans:[1],exp:'JWS: ✅Integrity ✅Authentication ❌Confidentiality. JWE: ✅Confidentiality ✅Integrity ❌Non-repudiation (by itself). "If you want to encrypt the token → use JWE."'},
{cat:'security',type:'multi',q:'Poważne błędy bezpieczeństwa przy JWT: (wielokrotny wybór)',opts:['JWT w localStorage (XSS vulnerability)','JWT bez exp (expiration)','RS256 zamiast HS256 w microservices','Brak rotacji kluczy (JWKS)','Wrażliwe dane w payload (hasła, PII)'],ans:[0,1,3,4],exp:'(A)✅ localStorage dostępne przez JS → XSS kradnie token. (B)✅ Bez exp token ważny na zawsze. (D)✅ Brak rotacji = trwała kompromitacja. (E)✅ Payload czytelny Base64URL. (C)❌ RS256 jest <em>bezpieczniejszy</em> w microservices niż HS256.'},
{cat:'security',type:'single',q:'Dlaczego JWT przechowywać w httpOnly cookie zamiast localStorage?',opts:['localStorage jest wolniejszy','httpOnly cookie niedostępny dla JavaScript → odporny na XSS; localStorage dostępny dla JS → token łatwy do kradzieży przez XSS','Cookie jest zawsze bezpieczniejszy','Nie ma różnicy'],ans:[1],exp:'"Storing JWT in localStorage → vulnerable to XSS. Sending refresh tokens via JavaScript → they should be stored in httpOnly secure cookies." httpOnly + Secure + SameSite=Strict to best practice.'},
{cat:'security',type:'single',q:'CORS — czy zabezpiecza API?',opts:['Tak — blokuje unauthorized requests','Mechanizm przeglądarki; NIE zabezpiecza API — curl/Postman/server-to-server ignorują CORS; chroni tylko użytkownika przeglądarki','Tak, na poziomie serwera','Zastępuje authentication'],ans:[1],exp:'"CORS is NOT a backend security mechanism. CORS does NOT block curl / Postman / backend clients." Serwer deklaruje policy (headers), przeglądarka egzekwuje. Endpoint bez auth dostępny dla wszystkich poza-przeglądarkowych klientów.'},
{cat:'security',type:'single',q:'Kiedy przeglądarka wysyła Preflight (OPTIONS)?',opts:['Zawsze dla każdego cross-origin','Dla "non-simple": PUT/DELETE/PATCH, custom headers (Authorization), Content-Type: application/json','Tylko przy cookies','Tylko HTTPS'],ans:[1],exp:'"For non-simple requests: PUT, DELETE, PATCH, custom headers (e.g. Authorization), Content-Type: application/json." Browser pyta serwer "Am I allowed to send the real request?" Serwer musi odpowiedzieć Access-Control-Allow-* headers.'},
{cat:'security',type:'single',q:'Authentication vs Authorization:',opts:['Są synonimami','AuthN = KIM jesteś (weryfikacja tożsamości); AuthZ = CO możesz zrobić (uprawnienia, role, scopes)','AuthN=uprawnienia; AuthZ=tożsamość','AuthN=API; AuthZ=UI'],ans:[1],exp:'"Authentication: Who are you?" "Authorization: What are you allowed to do?" "You cannot authorize without authentication." Kolejność: najpierw AuthN, potem AuthZ.'},
{cat:'security',type:'single',q:'Keystore vs Truststore:',opts:['Oba przechowują klucze publiczne','Keystore: prywatne klucze + certyfikaty (tożsamość serwera); Truststore: certyfikaty CA (lista zaufanych wystawców)','Truststore: prywatne klucze','Są identyczne'],ans:[1],exp:'"Keystore = server identity" (prywatny klucz + certyfikat). "Truststore = list of trusted issuers" (CA certificates). Metafora: keystore = dowód osobisty, truststore = lista zaufanych urzędów.'},
{cat:'security',type:'single',q:'TLS vs mTLS:',opts:['mTLS wolniejszy, TLS szybszy','TLS: one-way — klient weryfikuje serwer; mTLS: mutual — obie strony prezentują i weryfikują certyfikaty','mTLS=TLS z kompresją','mTLS deprecated'],ans:[1],exp:'"TLS: Authentication: One-way (Server to Client)." "mTLS: Authentication: Two-way (Client and Server)." mTLS używane w: microservices, zero-trust networks, IoT. Oba: keystore po stronie serwera, truststore po stronie weryfikującej.'},
{cat:'security',type:'single',q:'Asymetryczna kryptografia — encryption vs signature:',opts:['Identyczne użycie kluczy','Encryption: nadawca szyfruje kluczem publicznym odbiorcy → tylko odbiorca deszyfruje kluczem prywatnym; Signature: signer podpisuje kluczem prywatnym → każdy weryfikuje kluczem publicznym','Klucz prywatny tylko szyfruje','Klucz publiczny tylko deszyfruje'],ans:[1],exp:'"Use case A: Data encryption — client encrypts with server\'s public key, only server can decrypt with private key." "Use case B: Digital signature — server signs with private key, anyone verifies with public key." JWT (JWS) używa podpisu.'},
{cat:'security',type:'single',q:'TLS — dlaczego łączy asymetryczną i symetryczną kryptografię?',opts:['Symetryczna bezpieczniejsza','Asymetryczna do wymiany klucza sesji (handshake); symetryczna (AES-GCM) do szyfrowania danych (szybsza dla dużych ilości danych)','Tylko asymetryczna','Tylko symetryczna'],ans:[1],exp:'"TLS uses: Asymmetric crypto → only during handshake (authenticate + agree on session key). Symmetric crypto → for all actual data." "Asymmetric answers: who are you? Symmetric answers: how do we protect data?"'},
{cat:'security',type:'single',q:'OAuth 2.0 — czym jest, a czym NIE jest?',opts:['Framework autentykacji użytkowników','Framework delegowanej autoryzacji; NIE jest protokołem autentykacji (do tego OIDC nadbudowane na OAuth)','Protokół szyfrowania API','Zamiennik dla JWT'],ans:[1],exp:'"OAuth 2.0 is an authorization framework, not an authentication protocol." Odpowiada: "Is this client allowed to access this resource on behalf of someone?" NIE odpowiada: "Who is the user?" → do tego OpenID Connect (OIDC).'},
{cat:'security',type:'single',q:'LDAP — do czego służy?',opts:['Wydawanie JWT tokenów','Katalog tożsamości: przechowuje hierarchicznie użytkowników, hasła (hashed), grupy; NIE wydaje tokenów, NIE obsługuje OAuth flows','Framework autoryzacji jak OAuth','Protokół szyfrowania haseł'],ans:[1],exp:'"LDAP is a directory protocol used to: store user identities, authenticate users, organize users and groups hierarchically." Przykłady: Active Directory, OpenLDAP. "What LDAP does NOT do: Token issuance, Delegated authorization, OAuth flows."'},

// ═══════════════ COMMUNICATION ═══════════════
{cat:'communication',type:'single',q:'HTTP methods — która jest idempotentna ale nie safe?',opts:['GET','POST','PUT','PATCH'],ans:[2],exp:'GET: safe+idempotent. POST: nie safe, nie idempotent. PUT: idempotent (N wywołań = ten sam efekt), nie safe (modyfikuje). DELETE: idempotent, nie safe. PATCH: depends on implementation.'},
{cat:'communication',type:'single',q:'HTTP status codes — 401 vs 403:',opts:['401=Forbidden; 403=Unauthorized','401=Unauthorized (missing/invalid auth); 403=Forbidden (authenticated but not allowed)','Są synonimami','401=server error; 403=client error'],ans:[1],exp:'"401 Unauthorized: Missing or invalid auth" — "retry: ❌" — nie znamy tożsamości. "403 Forbidden: Authenticated but not allowed" — znamy tożsamość, ale brak uprawnień. 404=Not Found. 409=Conflict. 422=Semantic validation failed.'},
{cat:'communication',type:'single',q:'Idempotency Keys — do czego służą?',opts:['Klucze API do autentykacji','Unikalny ID w nagłówku requestu; serwer przechowuje key→response; retry z tym samym kluczem = ta sama odpowiedź bez re-wykonania operacji','Klucze szyfrowania request body','Session identifiers'],ans:[1],exp:'"To safely retry POST: Idempotency-Key: <uuid>. Server must guarantee: same request → same result, no duplicate side effects." Kluczowe przy płatnościach, tworzeniu zamówień.'},
{cat:'communication',type:'single',q:'Kafka — kluczowe cechy (3 absoluty):',opts:['Kafka jest queue-based; push-based; zna stan wiadomości','Kafka NIE jest queue (append-only log); NIE pushuje (consumers pull); dzieli dane na partycje','Kafka zawsze gwarantuje ordering globally','Kafka usuwa wiadomości po consumption'],ans:[1],exp:'"Kafka is NOT a queue — it\'s an append-only log, messages not removed when consumed." "Kafka does NOT push — consumers pull." "Kafka splits into partitions — topic = many partitions, ordering per partition only."'},
{cat:'communication',type:'single',q:'Kafka vs RabbitMQ — główna różnica:',opts:['Kafka push-based; RabbitMQ pull-based','Kafka: distributed log (retention, replay, offset per consumer, pull); RabbitMQ: message broker (message znika po ACK, push, smart routing)','RabbitMQ wyższy throughput','Kafka nie obsługuje consumer groups'],ans:[1],exp:'"Kafka → What happened? RabbitMQ → Do this." Kafka: event-driven, event sourcing, analytics, replay. RabbitMQ: background jobs, async commands, workflows, fine-grained routing.'},
{cat:'communication',type:'single',q:'Kafka — ordering guarantee:',opts:['Globalny ordering w całym topiku','Ordering garantowany TYLKO w ramach jednej partycji; klucz wiadomości decyduje o partycji','Brak ordering guarantee','Ordering per consumer group'],ans:[1],exp:'"Ordering is guaranteed only per partition." Jeśli OrderCreated, OrderPaid, OrderShipped mają ten sam key (orderId) → trafiają do tej samej partycji → ordering zachowany. Różne partycje → brak gwarancji.'},
{cat:'communication',type:'single',q:'RabbitMQ — DLQ (Dead Letter Queue):',opts:['Kafka ma DLQ; RabbitMQ nie','RabbitMQ ma first-class DLQ support (dead-letter exchange, TTL retries); Kafka nie ma built-in DLQ','Oba nie mają DLQ','Oba mają identyczny DLQ support'],ans:[1],exp:'"RabbitMQ has first-class DLQ support: retry queue, dead-letter exchange, TTL-based retries — broker-level support." "Kafka has no built-in DLQ. Typical patterns: retry topics, dead-letter topics, manual offset management — the application decides."'},
{cat:'communication',type:'single',q:'at-least-once vs exactly-once:',opts:['at-least-once=max raz; exactly-once=może być zgubiona','at-least-once=min raz (możliwe duplikaty, trzeba idempotency); exactly-once=dokładnie raz (droższe, Kafka transakcje)','Są identyczne','at-most-once=min raz'],ans:[1],exp:'at-most-once: może być zgubiona, brak duplikatów. at-least-once: nie zgubiona, możliwe duplikaty → konsument musi być idempotentny. exactly-once: najsilniejsza, droga (Kafka: idempotent producer + transactions).'},
{cat:'communication',type:'single',q:'WebSockets vs HTTP — kiedy używać WebSockets?',opts:['Dla wszystkich API — zawsze lepszy','Real-time updates: live chat, online games, collaborative editors, live dashboards — gdy serwer musi pushować dane do klienta','Dla stateless CRUD APIs','Gdy chcesz heavy caching'],ans:[1],exp:'"WebSocket: full-duplex, persistent communication over single TCP connection. When to use: Real-time updates, Chat, Live dashboards, Online games, Collaborative editors." "When NOT: Simple CRUD, Rare updates, Stateless interactions, Heavy caching required."'},
{cat:'communication',type:'single',q:'Kafka — co dzieje się gdy consumer crashuje?',opts:['Wiadomości tracone na zawsze','Kafka przechowuje wiadomości i offsety; nowy consumer (lub restart) wznawia od ostatniego committed offset — wiadomości mogą być reprocessed (by design)','Wiadomości ponownie wysyłane przez producenta','Kafka automatycznie retry'],ans:[1],exp:'"Consumer crashes: Kafka keeps messages, keeps offsets. New consumer resumes from last committed offset. ⚠️ Messages may be reprocessed. This is by design." Dlatego konsumenci Kafka muszą być idempotentni (Inbox Pattern).'},
{cat:'communication',type:'single',q:'API Versioning — URL path vs Header:',opts:['Header versioning zawsze lepszy','URL: /api/v2/orders — explicit, simple, cacheable, "URL pollution"; Header: Accept: vnd.app.v2+json — clean URLs, hard to debug; Query param: ?version=1 — easy, cache-unfriendly','Są identyczne','Query param najlepszy'],ans:[1],exp:'"URL versioning: explicit, simple → URL pollution. Header versioning: clean URLs → hard to debug. Best practice: URL versioning for public APIs, version only breaking changes."'},

// ═══════════════ KUBERNETES ═══════════════
{cat:'kubernetes',type:'single',q:'Kubernetes — model deklaratywny:',opts:['Wydajesz komendy: "uruchom kontener"','Deklarujesz desired state ("chcę 3 repliki"), K8s ciągle zapewnia że actual state = desired state (reconciliation)','Skrypty imperatywne zarządzają kontenerami','K8s tylko zarządza siecią'],ans:[1],exp:'"Instead of issuing commands like \'Run this container\', you declare: \'I want 3 instances of this application.\' The system continuously ensures that actual state matches the declared state."'},
{cat:'kubernetes',type:'single',q:'etcd w Kubernetes:',opts:['Container runtime (jak containerd)','Distributed key-value store przechowujący cały stan klastra — single source of truth; utrata = utrata stanu','Load balancer','Daemon zarządzający kontenerami'],ans:[1],exp:'"etcd: Distributed key-value store, Stores cluster state, Acts as the single source of truth." kube-apiserver: validates + persists resources in etcd. kube-scheduler: decides which Node a Pod runs on.'},
{cat:'kubernetes',type:'single',q:'Reconciliation Loop — jak działa?',opts:['CronJob harmonogram','Read desired state → Read actual state → If they differ: take corrective action → Repeat indefinitely','Restart failed Pods co N minut','Sync konfiguracji między węzłami'],ans:[1],exp:'"Every controller operates: 1. Read desired state (from API). 2. Read actual state. 3. If they differ — take corrective action. 4. Repeat indefinitely." Deployment z 3 replikami: jedna crashuje → controller tworzy nową.'},
{cat:'kubernetes',type:'single',q:'Pod — czym jest i jakie cechy ma?',opts:['Klaster Kubernetes','Smallest deployable unit: ≥1 kontener, shared networking, shared volumes, własny IP, ephemeral (może być usunięty w każdej chwili)','Persistent storage unit','Load balancer'],ans:[1],exp:'"A Pod is the smallest deployable unit. It contains: One or more containers, Shared networking, Shared volumes. Characteristics: Has its own IP address, Is ephemeral, May be recreated at any time."'},
{cat:'kubernetes',type:'single',q:'Deployment vs StatefulSet:',opts:['Deployment=stateful; StatefulSet=stateless','Deployment=stateless (Pody wymienne, no stable identity); StatefulSet=stateful (stable DNS names, persistent identity, stable storage, ordered scaling)','StatefulSet nie skaluje','Są identyczne'],ans:[1],exp:'"Deployment: container image, replicas, update strategy — manages ReplicaSets, rolling updates, rollbacks." "StatefulSet for stateful apps (e.g. databases): Stable DNS names, Persistent identity, Durable storage."'},
{cat:'kubernetes',type:'single',q:'Service types — które udostępniają aplikację POZA klastrem?',opts:['ClusterIP','NodePort, LoadBalancer, Ingress','Tylko Ingress','Headless Service'],ans:[1],exp:'ClusterIP: tylko wewnątrz klastra. NodePort: otwiera port na każdym węźle. LoadBalancer: external LB (cloud provider). Ingress: HTTP/HTTPS routing z domenami/ścieżkami (wymaga Ingress Controller np. NGINX).'},
{cat:'kubernetes',type:'single',q:'Liveness vs Readiness probes:',opts:['Identyczne — obydwie restartują Pod','Liveness: "czy kontener żyje?" — fail→restart; Readiness: "czy gotowy na ruch?" — fail→usunięty z Service endpoints (nie dostaje requestów), BEZ restartu','Readiness restartuje; Liveness usuwa z LB','Opcjonalne, bez wpływu na routing'],ans:[1],exp:'Liveness: ratuje przed deadlocks/infinite loops → restart. Readiness: warm-up, overload protection → usunięcie z LB endpoints. Używaj obu: liveness=is alive, readiness=is ready for traffic.'},
{cat:'kubernetes',type:'single',q:'ConfigMap vs Secret:',opts:['ConfigMap szyfrowany; Secret nie','ConfigMap: niesensytywna konfiguracja (plaintext w etcd); Secret: wrażliwe dane (base64 encoded w etcd domyślnie, opcjonalnie encryption at rest)','Secret tylko plik; ConfigMap tylko env var','Są identyczne'],ans:[1],exp:'"ConfigMap: stores configuration data — environment variables, files mounted in volumes." "Secret: stores passwords, tokens, certificates — stored as base64 in etcd by default." Dla produkcji: external secret manager (Vault) lub encryption at rest.'},
{cat:'kubernetes',type:'single',q:'Requests vs Limits w Pod:',opts:['Są tym samym','Requests: minimum resources (used by scheduler for placement); Limits: maximum allowed (exceeding memory = OOMKilled)','Requests=maximum; Limits=minimum','Dotyczą tylko CPU'],ans:[1],exp:'"Requests: Minimum required resources, Used by the scheduler." "Limits: Maximum allowed resources, Exceeding memory limit results in OOMKilled." Scheduler szuka węzła który ma wystarczające free resources dla requests.'},
{cat:'kubernetes',type:'single',q:'Rolling Update vs Recreate:',opts:['Rolling=usuwa wszystkie naraz; Recreate=stopniowo','Recreate: terminuje wszystkie stare naraz → downtime; Rolling Update: stopniowo wymienia stare→nowe → zero-downtime (chwilowo v1+v2 równolegle)','Są identyczne','Rolling tylko dla StatefulSets'],ans:[1],exp:'"Rolling update: Zero-downtime updates, Controlled parallel restarts." Recreate: "użyteczne gdy v1 i v2 nie mogą działać równocześnie (breaking DB schema changes)." Rolling Update konfiguracja: maxSurge, maxUnavailable.'},
{cat:'kubernetes',type:'single',q:'Namespace — do czego służy?',opts:['Alternatywna nazwa klastra','Logiczna partycja klastra: izolacja zasobów, separacja środowisk/teamów, ResourceQuota, RBAC per namespace','Fizyczny węzeł klastra','Linux network namespace'],ans:[1],exp:'"A Namespace is a logical partition within a cluster. Used for: Environment separation, Organizing resources, Access control, Applying quotas." Pody/Services/ConfigMaps są namespaced. Nodes/PersistentVolumes — cluster-level.'},
{cat:'kubernetes',type:'single',q:'RBAC w Kubernetes:',opts:['Role-Based Access Control: tylko dla zewnętrznych userów','Controls API access: Role (namespace), ClusterRole (cluster-wide), RoleBinding (binds role to user/serviceaccount)','Tylko dla Podów','Zastępuje authentication'],ans:[1],exp:'"RBAC controls API access: Role, ClusterRole, RoleBinding." ServiceAccount = identityPodu w klastrze. Możesz zdefiniować co dany ServiceAccount może robić przez RBAC (np. tylko read Secrets w określonym namespace).'},

// ═══════════════ OBSERVABILITY ═══════════════
{cat:'observability',type:'single',q:'Obserwability vs Monitoring:',opts:['Są synonimami','Monitoring: mówi że coś jest nie tak; Observability: pomaga odpowiedzieć DLACZEGO jest nie tak — understand internal state by looking at outputs (logs, metrics, traces)','Monitoring jest nowszy','Observability tylko dla cloud'],ans:[1],exp:'"Monitoring tells you something is wrong. Observability helps you answer why it is wrong." Observability = ability to understand internal state by looking at outputs: Logs, Metrics, Traces.'},
{cat:'observability',type:'single',q:'Trzy filary observability:',opts:['CPU, RAM, Disk','Logs (what happened?), Metrics (how often/how bad?), Traces (where did it happen?)','Alerts, Dashboards, Runbooks','Monitoring, Alerting, Profiling'],ans:[1],exp:'"Logs → what happened? Metrics → how often / how bad? Traces → where did it happen? They complement, not replace each other."'},
{cat:'observability',type:'single',q:'Metric types — Counter vs Gauge vs Histogram:',opts:['Są identyczne','Counter: zawsze rośnie (request count); Gauge: up&down (memory, active connections); Histogram: rozkład (latency buckets); Summary: quantiles (p95, p99)','Counter może maleć','Histogram jest najwolniejszy'],ans:[1],exp:'"Counter: always increases (request count). Gauge: up & down (memory, cpu). Histogram: distribution (latency). Summary: quantiles (p95 latency)." Metrics answer: "Is the system healthy?"'},
{cat:'observability',type:'single',q:'Distributed Tracing — co to jest?',opts:['Logowanie w IDE do debugowania','Śledzenie requestu przez wiele serwisów: Trace = zbiór Span\'ów; każdy Span = operacja z duration, metadata, parent; traceId propagowany przez headery','Profilowanie CPU i pamięci','Centralne logowanie błędów'],ans:[1],exp:'"Tracing follows a single request across services, threads, async boundaries. A trace consists of spans." Tools: Jaeger, Zipkin, Tempo. Standard: OpenTelemetry. Tracing answers: "Where exactly is time being spent?"'},
{cat:'observability',type:'single',q:'Correlation pattern — dlaczego ważny?',opts:['Do szyfrowania logów','Logs, metrics i traces muszą dzielić wspólne identyfikatory (traceId, requestId) — pozwala korelować zdarzenia across pillars','Do kompresji logów','Do autentykacji'],ans:[1],exp:'"Rule#1: Logs, metrics, and traces must share identifiers: traceId, spanId, requestId." Dzięki temu: znajdujesz log dla konkretnego requesta, przełączasz do tracing, patrzysz na metryki dla tego serwisu w tym czasie.'},
{cat:'observability',type:'single',q:'Anti-patterns w Observability:',opts:['Za dużo metryk jest problemem','Logging bez context, metrics bez alerts, alerts bez runbooks, tracing bez sampling strategy, dashboards których nikt nie przegląda','Za mało logów jest OK','Sampling zawsze 100%'],ans:[1],exp:'"Anti-patterns: Logging without context, Metrics without alerts, Alerts without runbooks, Tracing without sampling strategy, Dashboards no one looks at." "Don\'t use logs as metrics."'},
{cat:'observability',type:'single',q:'Logging best practices:',opts:['Plain text logi są wystarczające','Structured logs (JSON), correlation IDs, log events (nie control flow), unikaj logowania secrets, log at boundaries (IO, errors)','Loguj wszystko dla bezpieczeństwa','Jeden poziom logowania dla wszystkiego'],ans:[1],exp:'"Logging best practices: Structured logs (JSON, not plain text), Correlation IDs / trace IDs, Log events, not control flow, Avoid logging secrets, Log at boundaries (IO, errors)." Anti-pattern: "Logging everything, Using logs as metrics."'},
{cat:'observability',type:'single',q:'OpenTelemetry — co to jest?',opts:['Narzędzie do monitorowania serwisów AWS','Unified standard dla logs, metrics i traces — vendor-agnostic instrumentation; zastępuje proprietary clients (Jaeger client, Zipkin client, Prometheus client)','Framework do budowania dashboardów','Protokół szyfrowania telemetry'],ans:[1],exp:'"OpenTelemetry (OTel) → unified standard for logs, metrics, traces." Jeden zestaw SDK do instrumentacji, dowolny backend (Jaeger, Zipkin, Prometheus, Grafana, Datadog). Staje się de facto standardem branży.'},
];

let activeCat=new Set(Object.keys(CAT));
let deck=[],idx=0,answered=false,sel=new Set();
let stats={t:0,c:0,w:0};
document.getElementById('tc').textContent=Q.length;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function filtered(){return shuffle(Q.filter(q=>activeCat.has(q.cat)));}
function updStats(){
  document.getElementById('st').textContent=stats.t;
  document.getElementById('sc').textContent=stats.c;
  document.getElementById('sw').textContent=stats.w;
  const p=stats.t>0?Math.round(stats.c/stats.t*100):null;
  document.getElementById('sp').textContent=p!==null?p+'%':'–';
}
function buildFB(){
  const bar=document.getElementById('fb');bar.innerHTML='';
  const allA=activeCat.size===Object.keys(CAT).length;
  const ab=document.createElement('button');
  ab.className='fb'+(allA?' active':'');
  ab.textContent=`Wszystkie (${Q.length})`;
  if(allA){ab.style.borderColor='#7dd3fc';ab.style.color='#7dd3fc';}
  ab.onclick=()=>{activeCat=new Set(Object.keys(CAT));restart();};
  bar.appendChild(ab);
  Object.entries(CAT).forEach(([k,v])=>{
    const cnt=Q.filter(q=>q.cat===k).length;
    const b=document.createElement('button');
    const act=activeCat.has(k);
    b.className='fb'+(act?' active':'');
    b.textContent=`${v.l} (${cnt})`;
    if(act){b.style.borderColor=v.c;b.style.color=v.c;b.style.background=v.b;}
    b.onclick=()=>{if(activeCat.has(k)){if(activeCat.size>1)activeCat.delete(k);}else activeCat.add(k);restart();};
    bar.appendChild(b);
  });
}
function restart(){deck=filtered();idx=0;answered=false;sel.clear();buildFB();render();}
function render(){
  const card=document.getElementById('card');
  if(idx>=deck.length){
    card.innerHTML=`<div class="end"><div style="font-size:2.8rem">🎉</div><h2 style="color:#4ade80;margin:10px 0 7px">Koniec tali!</h2><p style="color:#94a3b8;margin-bottom:20px">Przeszedłeś ${deck.length} pytań z tej sesji.</p><button class="btn bp" onclick="restart()">🔄 Tasuj ponownie</button></div>`;
    return;
  }
  const q=deck[idx];const cat=CAT[q.cat];
  card.innerHTML=`
    <div class="badge" style="background:${cat.b};color:${cat.c};border:1px solid ${cat.c}">${cat.l}</div>
    <div class="qnum">Pytanie ${idx+1} / ${deck.length}</div>
    <div class="question" id="qq"></div>
    <div id="mh" class="mhint" style="display:${q.type==='multi'?'block':'none'}">⚠️ Wielokrotny wybór — zaznacz WSZYSTKIE poprawne odpowiedzi</div>
    <div class="options" id="opts"></div>
    <div class="exp" id="exp"></div>
    <div class="actions">
      <button class="btn bp" id="bc" onclick="check()" disabled>Sprawdź</button>
      <button class="btn bs" id="bn" onclick="next()" style="display:none">Następne →</button>
      <span class="di">${idx+1} / ${deck.length}</span>
    </div>`;
  document.getElementById('qq').textContent=q.q;
  const ls=['A','B','C','D','E'];
  const oel=document.getElementById('opts');
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';d.dataset.i=i;
    if(q.type==='multi')d.innerHTML=`<div class="cb" id="cb${i}"></div><span>${o}</span>`;
    else d.innerHTML=`<span class="ol">${ls[i]}.</span><span>${o}</span>`;
    d.onclick=()=>pick(i);oel.appendChild(d);
  });
  answered=false;sel.clear();
  document.getElementById('pf').style.width=(idx/deck.length*100)+'%';
}
function pick(i){
  if(answered)return;
  const q=deck[idx];const opts=document.querySelectorAll('.opt');
  if(q.type==='single'){
    sel.clear();opts.forEach(o=>o.classList.remove('sel'));
    sel.add(i);opts[i].classList.add('sel');
  }else{
    if(sel.has(i)){
      sel.delete(i);opts[i].classList.remove('sel');
      const cb=document.getElementById(`cb${i}`);if(cb){cb.textContent='';cb.style.background='';cb.style.borderColor='#475569';}
    }else{
      sel.add(i);opts[i].classList.add('sel');
      const cb=document.getElementById(`cb${i}`);if(cb)cb.textContent='✓';
    }
  }
  document.getElementById('bc').disabled=sel.size===0;
}
function check(){
  if(answered||sel.size===0)return;answered=true;
  const q=deck[idx];const opts=document.querySelectorAll('.opt');const correct=new Set(q.ans);
  const ok=sel.size===correct.size&&[...sel].every(i=>correct.has(i));
  opts.forEach((opt,i)=>{
    opt.classList.add('dis');
    if(correct.has(i)&&sel.has(i))opt.classList.add('ok');
    else if(sel.has(i)&&!correct.has(i))opt.classList.add('bad');
    else if(correct.has(i))opt.classList.add('rev');
  });
  stats.t++;if(ok)stats.c++;else stats.w++;updStats();
  const e=document.getElementById('exp');
  e.innerHTML=(ok?'✅ <strong>Poprawnie!</strong> ':'❌ <strong>Błędna odpowiedź.</strong> ')+q.exp;
  e.className='exp show';
  document.getElementById('bc').style.display='none';
  document.getElementById('bn').style.display='inline-block';
}
function next(){idx++;render();}

buildFB();deck=filtered();render();updStats();
</script>
</body>
</html>
